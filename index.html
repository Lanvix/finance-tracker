<meta name="theme-color" content="#10141a">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

  if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
    window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); });

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#10141a; --panel:#181f29; --panel-hi:#202938; --line:#2c3646;
    --text:#eceae4; --text-2:#a8b0bd; --text-3:#7d8695;
    --amber:#dca75e; --amber-dim:#4d3d22;
    --sage:#94c09b; --sage-dim:#2d4432;
    --clay:#cd7377; --clay-dim:#4a2b2e;
    --mono:'IBM Plex Mono','SF Mono',Consolas,monospace;
    --sans:'Space Grotesk','Segoe UI',sans-serif;
    --r:10px; --sp:16px;
  }
  [data-theme="light"]{
    --bg:#f4f2ec; --panel:#ffffff; --panel-hi:#efece4; --line:#ddd7ca;
    --text:#1e242e; --text-2:#4c5564; --text-3:#727b8a;
    --amber:#a06f1d; --amber-dim:#ecdfc2;
    --sage:#3d7a4a; --sage-dim:#d9e8dc;
    --clay:#b04a50; --clay-dim:#f0dcdd;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  .ob-step { font-family:var(--mono); font-size:12px; color:var(--text-3); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:8px; }
  .ord-btn { background:transparent; border:1px solid var(--line); color:var(--text-2); border-radius:7px; width:42px; min-height:38px; font-size:15px; }
  .ord-btn:active { border-color:var(--amber); color:var(--amber); }
  .seg { display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .seg button { flex:1; background:transparent; border:none; color:var(--text-2); font-family:var(--mono); font-size:12px; padding:9px 0; text-transform:uppercase; min-height:38px; }
  .seg button.active { background:var(--amber-dim); color:var(--amber); }

  .strategy-toggle { flex-wrap:wrap; }
  .strategy-toggle button { flex:1 1 45%; min-width:45%; }

  .sheet-overlay { position:fixed; inset:0; background:rgba(10,13,18,0.7); z-index:60; display:none; align-items:flex-end; }
  .sheet-overlay.show { display:flex; }
  .sheet-panel { background:var(--panel-hi); border:1px solid var(--line); border-bottom:none; border-radius:16px 16px 0 0; width:100%; max-width:480px; margin:0 auto; padding:20px 18px calc(20px + env(safe-area-inset-bottom)); animation:sheetUp 0.22s ease; }
  @keyframes sheetUp { from{ transform:translateY(40px); opacity:0.6; } to{ transform:translateY(0); opacity:1; } }
  @media (prefers-reduced-motion:reduce){ .sheet-panel{ animation:none; } }
  .sheet-grabber { width:38px; height:4px; border-radius:2px; background:var(--line); margin:0 auto 14px; }

  .lock-screen { position:fixed; inset:0; background:var(--bg); z-index:100; display:none; align-items:center; justify-content:center; text-align:center; padding:30px; }
  .lock-screen.show { display:flex; }
  .lock-screen input { width:180px; text-align:center; font-family:var(--mono); font-size:22px; letter-spacing:0.3em; background:var(--panel); border:1px solid var(--line); color:var(--text); padding:12px; border-radius:8px; }

  .test-pass { color:var(--sage); } .test-fail { color:var(--clay); }
  body { margin:0; background:var(--bg); }
  #app-root { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; max-width:480px; margin:0 auto; padding-bottom:92px; font-size:15px; line-height:1.5; }

  /* ---- type scale ---- */
  .t-page { font-size:23px; font-weight:600; letter-spacing:-0.01em; }
  .t-section { font-family:var(--mono); font-size:12px; letter-spacing:0.1em; color:var(--text-3); text-transform:uppercase; }
  .t-card { font-size:16px; font-weight:600; }
  .t-stat { font-family:var(--mono); font-size:21px; font-weight:500; }
  .t-hero { font-family:var(--mono); font-size:30px; font-weight:500; letter-spacing:-0.02em; }
  .t-body { font-size:14.5px; color:var(--text-2); }
  .t-help { font-size:13px; color:var(--text-2); }
  .t-micro { font-family:var(--mono); font-size:12px; color:var(--text-3); }

  .header { padding:20px var(--sp) 12px; display:flex; justify-content:space-between; align-items:center; }
  .view { padding:4px var(--sp) 12px; }
  .section { margin:22px 0 10px; display:flex; justify-content:space-between; align-items:center; }
  .section:first-child { margin-top:8px; }

  .card { background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:16px; margin-bottom:12px; }
  .card.hi { background:var(--panel-hi); }
  .card.cleared { opacity:0.55; }
  .card-row { display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
  .meta { font-size:13px; color:var(--text-2); margin-top:4px; }
  .micro { font-family:var(--mono); font-size:12px; color:var(--text-3); margin-top:4px; }

  .badge { font-family:var(--mono); font-size:11px; letter-spacing:0.04em; padding:3px 8px; border-radius:5px; text-transform:uppercase; white-space:nowrap; }
  .badge.priority { background:var(--amber-dim); color:var(--amber); }
  .badge.ok { background:var(--sage-dim); color:var(--sage); }
  .badge.warn { background:var(--clay-dim); color:var(--clay); }

  .bar-track { height:6px; background:var(--line); border-radius:3px; margin-top:10px; overflow:hidden; position:relative; }
  .bar-fill { height:100%; border-radius:3px; transition:width 0.4s ease; }
  .bar-pace { position:absolute; top:-2px; bottom:-2px; width:2px; background:var(--text-3); }
  @media (prefers-reduced-motion:reduce){ .bar-fill{transition:none;} }

  button { font-family:var(--sans); cursor:pointer; }
  .btn { width:100%; background:var(--amber); color:#10141a; border:none; padding:13px 0; border-radius:8px; font-weight:600; font-size:15px; min-height:46px; }
  .btn:active { opacity:0.85; }
  .btn.ghost { background:transparent; border:1px solid var(--line); color:var(--text-2); margin-top:8px; }
  .btn.sm { width:auto; padding:10px 16px; font-size:14px; min-height:42px; }
  .mini-btn { background:transparent; border:1px solid var(--line); color:var(--text-2); font-family:var(--mono); font-size:12.5px; padding:9px 13px; border-radius:7px; min-height:38px; }
  .mini-btn:active, .mini-btn:hover { border-color:var(--amber); color:var(--amber); }
  .mini-btn.accent { border-color:var(--amber-dim); color:var(--amber); }
  button:focus-visible, input:focus-visible, .tab:focus-visible { outline:2px solid var(--amber); outline-offset:2px; }

  .quick-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .qa { background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:14px 12px; color:var(--text); font-size:14px; text-align:left; min-height:48px; }
  .qa:active { background:var(--panel-hi); }
  .qa .micro { margin-top:2px; }

  .tabs { display:flex; position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--panel); border-top:1px solid var(--line); z-index:20; padding-bottom:env(safe-area-inset-bottom); }
  .tab { flex:1; text-align:center; padding:13px 0 11px; font-family:var(--mono); font-size:11.5px; letter-spacing:0.05em; color:var(--text-3); border:none; background:var(--panel); appearance:none; -webkit-appearance:none; border-top:2px solid transparent; text-transform:uppercase; border-radius:0; }
  .tab.active { color:var(--amber); border-top-color:var(--amber); }

  .form { background:var(--panel-hi); border:1px solid var(--line); border-radius:var(--r); padding:16px; margin-top:10px; display:none; }
  .form.open { display:block; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-family:var(--mono); font-size:11.5px; color:var(--text-3); letter-spacing:0.05em; text-transform:uppercase; margin-bottom:6px; }
  .field input, .field select { width:100%; background:var(--bg); border:1px solid var(--line); color:var(--text); padding:12px; border-radius:8px; font-family:var(--sans); font-size:15px; min-height:46px; }
  .row2 { display:flex; gap:10px; }
  .row2 .field, .row2 > * { flex:1; }
  .row2 .mini-btn { flex:1; }

  .empty { font-size:13.5px; color:var(--text-3); padding:24px 12px; text-align:center; border:1px dashed var(--line); border-radius:var(--r); line-height:1.6; }
  .plus { background:var(--panel); border:1px solid var(--line); color:var(--amber); width:100%; padding:12px 0; border-radius:var(--r); font-family:var(--mono); font-size:13px; letter-spacing:0.04em; margin-top:4px; min-height:44px; }

  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stat { background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:14px; }
  .stat .t-micro { text-transform:uppercase; letter-spacing:0.06em; }
  .stat .t-stat { margin-top:6px; }

  .alert { display:flex; gap:10px; align-items:flex-start; background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--clay); border-radius:var(--r); padding:13px 14px; margin-bottom:10px; }
  .alert.info { border-left-color:var(--amber); }
  .alert .t-help { margin-top:2px; }

  .strategy-toggle { display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; margin-bottom:12px; }
  .strategy-toggle button { flex:1; background:transparent; border:none; color:var(--text-2); font-family:var(--mono); font-size:12px; letter-spacing:0.04em; padding:12px 0; text-transform:uppercase; min-height:44px; }
  .strategy-toggle button.active { background:var(--amber-dim); color:var(--amber); }

  .hero-num { font-family:var(--mono); font-size:30px; color:var(--sage); letter-spacing:-0.02em; }
  .chart-wrap svg { width:100%; height:100px; display:block; margin-top:10px; }
  .scen-table { width:100%; border-collapse:collapse; font-family:var(--mono); font-size:12.5px; margin-top:8px; }
  .scen-table td, .scen-table th { padding:9px 6px; border-bottom:1px solid var(--line); text-align:right; color:var(--text-2); }
  .scen-table th { color:var(--text-3); font-weight:400; text-transform:uppercase; font-size:11px; letter-spacing:0.05em; }
  .scen-table td:first-child, .scen-table th:first-child { text-align:left; color:var(--text); }

  details.debt-detail { margin-top:10px; }
  details.debt-detail summary { font-family:var(--mono); font-size:12.5px; color:var(--text-3); cursor:pointer; list-style:none; min-height:38px; display:flex; align-items:center; }
  details.debt-detail summary::before { content:'▸ '; margin-right:4px; }
  details[open].debt-detail summary::before { content:'▾ '; }
  .pay-history { font-family:var(--mono); font-size:12px; color:var(--text-2); margin-top:8px; }
  .pay-history div { padding:5px 0; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; }

  .activity-item { display:flex; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid var(--line); font-size:13.5px; color:var(--text-2); }
  .activity-item:last-child { border-bottom:none; }
  .activity-item .t-micro { flex-shrink:0; }

  .celebrate { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(16,20,26,0.9); z-index:50; text-align:center; padding:30px; }
  .celebrate.show { display:flex; }
  .celebrate .t-hero { color:var(--amber); }
  .toast { position:fixed; bottom:76px; left:50%; transform:translateX(-50%); background:var(--panel-hi); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:11px 18px; font-size:14px; z-index:40; display:none; max-width:90%; align-items:center; gap:14px; }
  .toast.show { display:flex; }
  .toast .undo-btn { background:transparent; border:none; color:var(--amber); font-family:var(--mono); font-size:13px; letter-spacing:0.05em; text-transform:uppercase; padding:6px 4px; min-height:0; }
  ::placeholder { color:#4d5666; }
  textarea { resize:vertical; }
</style>

<div id="app-root">
  <div class="header">
    <div>
      <div class="t-micro" style="text-transform:uppercase; letter-spacing:0.12em;">// finances</div>
      <div class="t-page">Runway <span id="storage-badge" class="badge warn" style="display:none; vertical-align:middle; font-weight:400;"></span></div>
    </div>
  </div>

  <div class="tabs" role="tablist">
    <button class="tab active" data-view="home" role="tab">Home</button>
    <button class="tab" data-view="plan" role="tab">Plan</button>
    <button class="tab" data-view="debts" role="tab">Debts</button>
    <button class="tab" data-view="budget" role="tab">Budget</button>
    <button class="tab" data-view="more" role="tab">More</button>
  </div>

  <div class="view" id="view-home"></div>
  <div class="view" id="view-plan" style="display:none"></div>
  <div class="view" id="view-debts" style="display:none"></div>
  <div class="view" id="view-budget" style="display:none"></div>
  <div class="view" id="view-more" style="display:none"></div>

  <div class="celebrate" id="celebrate" role="dialog" aria-modal="true">
    <div>
      <div class="t-hero">[█████]</div>
      <div class="t-card" style="color:var(--sage); margin-top:16px; font-size:19px;" id="celebrate-title">Debt cleared</div>
      <div class="t-help" id="celebrate-sub" style="margin-top:10px; line-height:1.6;"></div>
      <button class="btn sm" style="margin-top:20px;" id="celebrate-close">Keep going</button>
    </div>
  </div>
  <div class="toast" id="toast" role="status"></div>

  <div class="sheet-overlay" id="sheet" role="dialog" aria-modal="true">
    <div class="sheet-panel">
      <div class="sheet-grabber"></div>
      <div class="t-card" id="sheet-title" style="margin-bottom:14px;"></div>
      <div id="sheet-fields"></div>
      <button class="btn" id="sheet-save">Save</button>
      <button class="btn ghost" id="sheet-cancel">Cancel</button>
    </div>
  </div>

  <div class="lock-screen" id="lock-screen">
    <div>
      <div class="t-micro" style="text-transform:uppercase; letter-spacing:0.12em; margin-bottom:6px;">// runway</div>
      <div class="t-card" style="margin-bottom:18px;">Enter your PIN</div>
      <input id="lock-pin" type="password" inputmode="numeric" maxlength="8" autocomplete="off"/>
      <div><button class="btn sm" id="lock-unlock" style="margin-top:16px;">Unlock</button></div>
      <div class="t-help" id="lock-msg" style="margin-top:12px; min-height:20px;"></div>
    </div>
  </div>
</div>

<script>
(function(){
  const STORE_KEY = 'finance-tracker-state-v1';
  let state = defaults();
  let loaded=false, storageOk=null, warnedOnce=false, editingIndex=null, currentView='home';

  function defaults(){
    return { debts:[], categories:[], bills:[], goals:[], activity:[], accounts:[], snapshots:[],
      budgetIncome:0, strategy:'avalanche', extraPayment:0, lumpSum:0,
      settings:{ theme:'dark', budgetView:'month', payFrequency:'monthly', nextPayday:null, pinHash:null },
      lastBackupAt:null,
      onboarded:false,
      monthKey: monthKeyNow() };
  }
  function monthKeyNow(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
  function migrate(s){
    const base = defaults();
    s = { ...base, ...s };
    s.settings = { ...base.settings, ...(s.settings||{}) };
    s.debts = (s.debts||[]).map((d,i) => ({ payments:[], promoEnd:null, postPromoApr:null, dueDay:null, ord:i, fixedInterest:false, ...d }));
    s.debts.forEach((d,i)=>{ if (d.ord==null) d.ord=i; });
    s.bills = (s.bills||[]).map(b => ({ paid:false, freq:'monthly', ...b }));
    s.goals = (s.goals||[]).map(g => ({ targetDate:null, ...g }));
    s.activity = s.activity||[];
    s.accounts = s.accounts||[];
    s.snapshots = s.snapshots||[];
    s.categories = (s.categories||[]).map(c => ({ entries:[], rollover:false, carry:0, ...c }));
    // existing users skip onboarding
    if (s.debts.length || Number(s.budgetIncome)>0 || s.categories.length) s.onboarded = true;
    return s;
  }
  function applyTheme(){ document.documentElement.setAttribute('data-theme', (state.settings&&state.settings.theme)||'dark');
    const tc=document.querySelector('meta[name="theme-color"]'); if (tc) tc.content = state.settings.theme==='light' ? '#f4f2ec' : '#10141a'; }

  // ---------- bottom sheet (replaces prompt dialogs) ----------
  let sheetOnSave = null;
  function openSheet(cfg){
    const sh = document.getElementById('sheet');
    document.getElementById('sheet-title').textContent = cfg.title;
    document.getElementById('sheet-save').textContent = cfg.saveLabel || 'Save';
    const wrap = document.getElementById('sheet-fields');
    wrap.innerHTML = cfg.fields.map(f=>`
      <div class="field">
        <label for="sf-${f.id}">${esc(f.label)}</label>
        <input id="sf-${f.id}" type="${f.type||'number'}" ${(f.type||'number')==='number'?'inputmode="decimal"':''} value="${f.value!=null?esc(f.value):''}" placeholder="${esc(f.placeholder||'')}"/>
      </div>`).join('');
    sheetOnSave = ()=>{
      const values = {};
      cfg.fields.forEach(f=>{ values[f.id] = document.getElementById('sf-'+f.id).value; });
      return cfg.onSave(values);
    };
    sh.classList.add('show');
    const first = wrap.querySelector('input');
    if (first) setTimeout(()=>{ first.focus(); first.select && first.select(); }, 60);
  }
  function closeSheet(){ document.getElementById('sheet').classList.remove('show'); sheetOnSave=null; }
  document.getElementById('sheet-cancel').onclick = closeSheet;
  document.getElementById('sheet').addEventListener('click', e=>{ if (e.target.id==='sheet') closeSheet(); });
  document.getElementById('sheet-save').onclick = ()=>{ if (sheetOnSave){ const ok = sheetOnSave(); if (ok !== false) closeSheet(); } };
  document.getElementById('sheet-fields').addEventListener('keydown', e=>{ if (e.key==='Enter'){ e.preventDefault(); document.getElementById('sheet-save').click(); } });

  // ---------- PIN lock (deterrent, not encryption) ----------
  async function sha256(str){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  function showLockIfNeeded(){
    if (!state.settings.pinHash) return;
    const ls = document.getElementById('lock-screen');
    ls.classList.add('show');
    const pin = document.getElementById('lock-pin'), msg = document.getElementById('lock-msg');
    pin.value=''; msg.textContent='';
    const tryUnlock = async ()=>{
      if (!pin.value) return;
      const h = await sha256(pin.value);
      if (h === state.settings.pinHash){ ls.classList.remove('show'); }
      else { msg.textContent = "That's not it — try again."; pin.value=''; }
    };
    document.getElementById('lock-unlock').onclick = tryUnlock;
    pin.onkeydown = e=>{ if (e.key==='Enter') tryUnlock(); };
    setTimeout(()=>pin.focus(), 100);
  }

  // ---------- pay cycle (4-weekly support) ----------
  function monthlyIncome(){
    const raw = Number(state.budgetIncome)||0;
    return state.settings.payFrequency === '4weekly' ? raw * 13 / 12 : raw;
  }
  function bonusPacketMonth(){
    // With 4-weekly pay there are 13 packets/year; find the next month containing two paydays.
    if (state.settings.payFrequency !== '4weekly' || !state.settings.nextPayday) return null;
    let d = new Date(state.settings.nextPayday + 'T12:00:00');
    if (isNaN(d)) return null;
    const counts = {};
    for (let i=0; i<14; i++){
      const k = d.getFullYear()+'-'+d.getMonth();
      counts[k] = (counts[k]||0)+1;
      if (counts[k] === 2) return new Date(d.getFullYear(), d.getMonth(), 1);
      d = new Date(d.getTime() + 28*86400000);
    }
    return null;
  }

  async function load(){
    try {
      if (window.storage && window.storage.get){
        const res = await window.storage.get(STORE_KEY, false);
        if (res && res.value){ state = migrate(JSON.parse(res.value)); storageOk = true; }
      } else {
        const raw = localStorage.getItem(STORE_KEY);
        if (raw){ state = migrate(JSON.parse(raw)); storageOk = true; }
      }
    } catch(e){}
    loaded = true;
    showLockIfNeeded();
    renderAll();
  }
  async function save(){
    const payload = JSON.stringify(state);
    try {
      if (window.storage && window.storage.set){
        await window.storage.set(STORE_KEY, payload, false);
        const check = await window.storage.get(STORE_KEY, false);
        storageOk = !!(check && check.value === payload);
      } else {
        localStorage.setItem(STORE_KEY, payload);
        storageOk = localStorage.getItem(STORE_KEY) === payload;
      }
    } catch(e){
      storageOk = false;
      if (!warnedOnce){ console.warn('Auto-save unavailable — use Backup in More.'); warnedOnce = true; }
    }
    updateStorageBadge();
  }
  function updateStorageBadge(){
    const el = document.getElementById('storage-badge');
    if (!el) return;
    if (storageOk === false){ el.style.display='inline-block'; el.textContent='auto-save off — back up in More'; }
    else el.style.display='none';
  }

  // ---------- helpers ----------
  const fmt = n => '£' + Number(n||0).toLocaleString('en-GB',{maximumFractionDigits:0});
  const fmt2 = n => '£' + Number(n||0).toLocaleString('en-GB',{minimumFractionDigits:2, maximumFractionDigits:2});
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthLabel = off => { const d=new Date(); d.setMonth(d.getMonth()+off); return MONTHS[d.getMonth()]+' '+d.getFullYear(); };
  const esc = s => String(s??'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const activeDebts = () => state.debts.filter(d => Number(d.balance) > 0);
  function logActivity(txt){
    // skip if identical to the most recent entry from the same day (toggle spam)
    const today = new Date().toISOString().slice(0,10);
    if (state.activity[0] && state.activity[0].txt === txt && state.activity[0].d === today) return;
    // collapse repeated "Set extra debt payment" tweaks from the same day into one
    if (txt.startsWith('Set extra debt payment') && state.activity[0] && state.activity[0].txt.startsWith('Set extra debt payment') && state.activity[0].d === today){
      state.activity[0].txt = txt;
      return;
    }
    state.activity.unshift({ d:today, txt });
    if (state.activity.length > 100) state.activity.length = 100;
  }
  let toastTimer=null;
  function toast(msg, undoFn){
    const t=document.getElementById('toast');
    t.innerHTML = '';
    const span=document.createElement('span'); span.textContent=msg; t.appendChild(span);
    if (undoFn){
      const b=document.createElement('button'); b.className='undo-btn'; b.textContent='Undo';
      b.onclick = ()=>{ undoFn(); save(); renderAll(); toast('Undone'); };
      t.appendChild(b);
    }
    t.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'), undoFn ? 7000 : 2600);
  }
  function dropActivityHead(txt){
    if (state.activity[0] && state.activity[0].txt === txt) state.activity.shift();
  }

  // ---------- simulation (rate-aware, lump-sum aware) ----------
  function effApr(d, when){
    if (d.promoEnd && when < new Date(d.promoEnd)) return Number(d.apr)||0;
    if (d.promoEnd) return (d.postPromoApr!=null && d.postPromoApr!=='') ? Number(d.postPromoApr) : Number(d.apr)||0;
    return Number(d.apr)||0;
  }
  // marginal rate: what overpaying actually saves — zero for fixed/HP debts where interest is precomputed
  function marginalApr(d, when){ return d.fixedInterest ? 0 : effApr(d, when); }
  function debtSorter(strategy, when){
    const balOf = d => d.bal !== undefined ? d.bal : Number(d.balance);
    if (strategy==='custom') return (a,b)=> (a.ord??999)-(b.ord??999);
    if (strategy==='snowball') return (a,b)=> balOf(a)-balOf(b);
    if (strategy==='promo'){
      const key = d => d.promoEnd ? new Date(d.promoEnd).getTime() : Infinity;
      return (a,b)=>{ const k = key(a)-key(b); if (k) return k; const r = marginalApr(b,when)-marginalApr(a,when); return r !== 0 ? r : balOf(a)-balOf(b); };
    }
    return (a,b)=>{ const diff = marginalApr(b,when)-marginalApr(a,when); return diff !== 0 ? diff : balOf(a)-balOf(b); };
  }
  function simulate(strategy, extra, lump, srcOverride){
    const src = srcOverride || activeDebts();
    if (!src.length) return null;
    const ds = src.map(d => ({...d, bal:Number(d.balance)}));
    const now = new Date();
    // apply lump sum now to strategy target
    if (lump > 0){
      const order = [...ds].sort(debtSorter(strategy, now));
      let rem = lump;
      for (const d of order){ if (rem<=0) break; const p=Math.min(rem,d.bal); d.bal-=p; rem-=p; }
    }
    const totalBudget = src.reduce((s,d)=>s+Number(d.minPayment||0),0) + extra;
    const start = new Date(); start.setDate(1);
    let month=0, totalInterest=0;
    const series=[ds.reduce((s,d)=>s+d.bal,0)], payoffs={};
    while (ds.some(d=>d.bal>0.005) && month<600){
      month++;
      const cur = new Date(start.getFullYear(), start.getMonth()+month, 1);
      ds.forEach(d=>{ if(d.bal<=0 || d.fixedInterest)return; const i=d.bal*(effApr(d,cur)/100/12); d.bal+=i; totalInterest+=i; });
      let remaining = totalBudget;
      ds.forEach(d=>{ if(d.bal>0){ const p=Math.min(Number(d.minPayment||0),d.bal); d.bal-=p; remaining-=p; } });
      const order = ds.filter(d=>d.bal>0).sort(debtSorter(strategy, cur));
      for (const d of order){ if(remaining<=0)break; const p=Math.min(remaining,d.bal); d.bal-=p; remaining-=p; }
      ds.forEach(d=>{ if(d.bal<=0.005 && payoffs[d.name]===undefined){ payoffs[d.name]=month; d.bal=0; } });
      series.push(ds.reduce((s,d)=>s+d.bal,0));
    }
    return { months:month, totalInterest, series, payoffs, finished:!ds.some(d=>d.bal>0.005) };
  }
  // ---------- self-tests: engine checked against independently derived expectations ----------
  function runSelfTests(){
    const t = [];
    const check = (name, cond, detail) => t.push({ name, pass: !!cond, detail });
    // 1. Amortisation vs closed form: £1,000 @ 12% APR, £100/mo → n = ln(1/(1−rP/A))/ln(1+r) ≈ 10.6 → 11 months
    const s1 = simulate('avalanche', 0, 0, [{name:'T1', balance:1000, apr:12, minPayment:100}]);
    check('Amortisation matches closed-form', s1 && s1.finished && s1.months===11 && s1.totalInterest>50 && s1.totalInterest<65,
      s1 ? `${s1.months}mo, ${fmt2(s1.totalInterest)} interest (expected 11mo, ~£57)` : 'no result');
    // 2. Promo rate flips on the end date
    const pd = {apr:0, promoEnd:'2020-01-01', postPromoApr:29.9};
    check('Promo APR flips after end date', effApr(pd, new Date('2019-06-01'))===0 && effApr(pd, new Date('2021-06-01'))===29.9,
      `before: ${effApr(pd, new Date('2019-06-01'))}%, after: ${effApr(pd, new Date('2021-06-01'))}%`);
    // 3. Fixed-interest debts accrue nothing
    const s3 = simulate('avalanche', 0, 0, [{name:'T3', balance:1200, apr:19.9, minPayment:100, fixedInterest:true}]);
    check('Fixed loans accrue zero interest', s3 && s3.finished && s3.months===12 && s3.totalInterest===0,
      s3 ? `${s3.months}mo, ${fmt2(s3.totalInterest)} interest (expected 12mo, £0)` : 'no result');
    // 4. Cleared debt's minimum rolls into the attack
    const s4 = simulate('avalanche', 0, 0, [{name:'A', balance:100, apr:0, minPayment:100},{name:'B', balance:900, apr:0, minPayment:0}]);
    check('Cleared minimums roll over', s4 && s4.finished && s4.months===10,
      s4 ? `${s4.months}mo for £1,000 at £100/mo budget (expected 10)` : 'no result');
    // 5. Custom order respected
    const s5 = simulate('custom', 50, 0, [{name:'A', balance:100, apr:0, minPayment:0, ord:1},{name:'B', balance:100, apr:0, minPayment:0, ord:0}]);
    check('Custom order targets in sequence', s5 && s5.payoffs['B']===2 && s5.payoffs['A']===4,
      s5 ? `B cleared month ${s5.payoffs['B']}, A month ${s5.payoffs['A']} (expected 2 and 4)` : 'no result');
    // 6. Payments never overshoot: final projected balance is exactly zero
    const s6 = simulate('snowball', 37, 0, [{name:'X', balance:333.33, apr:21.7, minPayment:11}]);
    check('Balances clamp cleanly to zero', s6 && s6.finished && Math.abs(s6.series[s6.series.length-1])<0.01,
      s6 ? `final balance ${s6.series[s6.series.length-1].toFixed(4)}` : 'no result');
    return t;
  }

  function sparkline(seriesList){
    // seriesList: [{series, color}]
    const valid = seriesList.filter(s=>s.series && s.series.length>1);
    if (!valid.length) return '';
    const w=400,h=100,pad=4;
    const max = Math.max(...valid.map(s=>Math.max(...s.series)));
    const lines = valid.map(s=>{
      const n=s.series.length, step=Math.max(1,Math.floor(n/120));
      let pts=[];
      for(let i=0;i<n;i+=step){
        const x=pad+(i/(n-1))*(w-pad*2), y=h-pad-(s.series[i]/max)*(h-pad*2);
        pts.push(x.toFixed(1)+','+y.toFixed(1));
      }
      const last=s.series[n-1];
      pts.push((w-pad).toFixed(1)+','+(h-pad-(last/max)*(h-pad*2)).toFixed(1));
      return `<polyline points="${pts.join(' ')}" fill="none" stroke="${s.color}" stroke-width="2" stroke-dasharray="${s.dash||'none'}"/>`;
    }).join('');
    return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" role="img" aria-label="Projected balances over time">
      ${lines}<line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#2c3646" stroke-width="1"/></svg>`;
  }

  // ---------- money maths ----------
  function money(){
    const income = monthlyIncome();
    const billsTotal = state.bills.reduce((s,b)=>s + (b.freq==='annual' ? Number(b.amount||0)/12 : Number(b.amount||0)),0);
    const minTotal = activeDebts().reduce((s,d)=>s+Number(d.minPayment||0),0);
    const goalsTotal = state.goals.reduce((s,g)=>s+Number(g.monthly||0),0);
    const extra = Number(state.extraPayment)||0;
    const freeCash = income - billsTotal - minTotal - extra - goalsTotal;
    return { income, billsTotal, minTotal, goalsTotal, extra, freeCash };
  }

  // ---------- recommendations & alerts (rule-based, explainable) ----------
  function buildAlerts(){
    const alerts=[];
    const now = new Date();
    const sim = simulate(state.strategy, state.extraPayment, 0);
    activeDebts().forEach(d=>{
      if (d.promoEnd){
        const end = new Date(d.promoEnd);
        const days = Math.ceil((end-now)/86400000);
        const projM = sim && sim.payoffs[d.name];
        const projDate = projM!=null ? new Date(now.getFullYear(), now.getMonth()+projM, 1) : null;
        if (days>0 && days<=90)
          alerts.push({ level:'warn', title:`${d.name}: 0% rate ends in ${days} days`,
            body: projDate && projDate>end
              ? `Your current plan clears it after the deadline — after ${end.getDate()} ${MONTHS[end.getMonth()]} it starts charging ${d.postPromoApr??d.apr}%. Consider targeting it now.`
              : `Clear the ${fmt(d.balance)} balance before ${end.getDate()} ${MONTHS[end.getMonth()]} to pay no interest on it at all.` });
        else if (days<=0)
          alerts.push({ level:'warn', title:`${d.name}: promo has ended`, body:`It's now charging ${d.postPromoApr??d.apr}% — it may deserve a higher priority.` });
      }
    });
    if (sim && !sim.finished)
      alerts.push({ level:'warn', title:'Your payments never clear the debt', body:'At current minimums plus extra, interest grows faster than you pay. Add more per month on the Plan tab, even a little.' });
    state.categories.forEach(c=>{
      if (Number(c.allocated)>0 && Number(c.spent)>Number(c.allocated))
        alerts.push({ level:'warn', title:`${c.name} is over budget`, body:`You've spent ${fmt2(c.spent)} of ${fmt(c.allocated)} — ${fmt2(c.spent-c.allocated)} over. Trimming another category keeps the month on plan.` });
    });
    const m = money();
    if (m.income>0 && m.freeCash<0)
      alerts.push({ level:'warn', title:'This month is overcommitted', body:`Bills, minimums, extra debt payments and goals add up to ${fmt(m.income-m.freeCash)} against ${fmt(m.income)} income — ${fmt(-m.freeCash)} short. Something has to give.` });
    const today = now.getDate();
    state.bills.filter(b=>!b.paid && b.dueDay && b.dueDay>=today && b.dueDay<=today+7).forEach(b=>{
      alerts.push({ level:'info', title:`${b.name} due on the ${ord(b.dueDay)}`, body:`${fmt2(b.amount)} — mark it paid on the Budget tab once it goes out.` });
    });
    // backup durability nudge — browser storage can be evicted; local-only data needs a copy somewhere
    if (state.debts.length || state.categories.length){
      const last = state.lastBackupAt ? new Date(state.lastBackupAt) : null;
      const stale = !last || (now - last) > 30*86400000;
      if (stale) alerts.push({ level:'info', title: last ? "It's been a month since your last backup" : "You haven't backed up yet",
        body:'Everything lives only in this browser — the phone can clear it under storage pressure. Thirty seconds in More → Backup keeps your history safe.' });
    }
    // 4-weekly bonus packet heads-up
    const bm = bonusPacketMonth();
    if (bm){
      const monthsAway = (bm.getFullYear()-now.getFullYear())*12 + (bm.getMonth()-now.getMonth());
      if (monthsAway >= 0 && monthsAway <= 1)
        alerts.push({ level:'info', title:`Double-payday month: ${MONTHS[bm.getMonth()]}`,
          body:`You get 13 packets a year on 4-weekly pay, and ${monthsAway===0?'this month':'next month'} is the one with two. That spare ${fmt(state.budgetIncome)} isn't in the monthly plan — pointing it at your target debt is a free month of progress.` });
    }
    return alerts;
  }
  const ord = n => n + (['th','st','nd','rd'][((n%100)>10 && (n%100)<14) ? 0 : Math.min(n%10,4)] || 'th');

  function nextBestMove(){
    const now = new Date();
    const act = activeDebts();
    if (!act.length) return null;
    // 1) promo at risk beats everything
    const sim = simulate(state.strategy, state.extraPayment, 0);
    for (const d of act){
      if (d.promoEnd){
        const end = new Date(d.promoEnd);
        const days = Math.ceil((end-now)/86400000);
        const projM = sim && sim.payoffs[d.name];
        const projDate = projM!=null ? new Date(now.getFullYear(), now.getMonth()+projM, 1) : null;
        if (days>0 && days<=120 && projDate && projDate>end)
          return { title:`Put spare money on ${d.name} first`,
            why:`Its 0% rate ends ${end.getDate()} ${MONTHS[end.getMonth()]} (${days} days) and your current plan doesn't clear it in time — after that it charges ${d.postPromoApr??d.apr}%, roughly ${fmt(d.balance*(Number(d.postPromoApr??d.apr)/100/12))}/month in interest.` };
      }
    }
    // 2) strategy target
    const target = [...act].sort(debtSorter(state.strategy, now))[0];
    if (state.strategy==='avalanche')
      return { title:`Anything spare goes on ${target.name}`,
        why:`It's your most expensive debt at ${effApr(target,now)}% — every £100 paid off it saves about ${fmt2(100*(effApr(target,now)/100/12))} in interest every month from now on.` };
    if (state.strategy==='snowball')
      return { title:`Anything spare goes on ${target.name}`,
        why:`It's your smallest balance at ${fmt(target.balance)} — clearing it frees up ${fmt2(target.minPayment)}/month and gives you a quick win.` };
    if (state.strategy==='promo')
      return { title:`Anything spare goes on ${target.name}`,
        why: target.promoEnd
          ? `It has the nearest promo deadline (${new Date(target.promoEnd).getDate()} ${MONTHS[new Date(target.promoEnd).getMonth()]}) — clearing it before the rate flips means paying no interest on it at all.`
          : `No promos left to beat, so it falls back to your most expensive debt at ${effApr(target,now)}%.` };
    return { title:`Anything spare goes on ${target.name}`,
      why:`It's first in your custom order. Worth knowing: at ${effApr(target,now)}% it costs about ${fmt2(target.balance*(effApr(target,now)/100/12))}/month in interest right now.` };
  }

  // ---------- month rollover ----------
  function checkNewMonth(){
    if (state.monthKey !== monthKeyNow()){
      return true;
    }
    return false;
  }
  function netPosition(){
    const assets = state.accounts.reduce((s,a)=>s+Number(a.balance||0),0) + state.goals.reduce((s,g)=>s+Number(g.saved||0),0);
    const owed = state.debts.reduce((s,d)=>s+Number(d.balance||0),0);
    return { assets, owed, net: assets - owed };
  }
  function takeSnapshot(){
    const np = netPosition();
    const k = monthKeyNow();
    state.snapshots = state.snapshots.filter(s=>s.k!==k);
    state.snapshots.push({ k, owed:np.owed, assets:np.assets, net:np.net });
    if (state.snapshots.length > 36) state.snapshots = state.snapshots.slice(-36);
  }
  function startNewMonth(){
    takeSnapshot();
    state.categories.forEach(c=>{
      if (c.rollover){
        const eff = Number(c.allocated||0) + Number(c.carry||0);
        c.carry = Math.max(0, eff - Number(c.spent||0));
      } else c.carry = 0;
      c.spent = 0;
      c.entries = [];
    });
    state.bills.forEach(b=> b.paid = false);
    state.monthKey = monthKeyNow();
    logActivity('Started a new budget month');
    save(); renderAll();
    toast('New month — spends reset, bills unpaid');
  }

  // ---------- tabs ----------

  function goTab(name){ document.querySelector(`.tab[data-view="${name}"]`).click(); }

  document.getElementById('celebrate-close').onclick = ()=> document.getElementById('celebrate').classList.remove('show');
  function celebrate(name){

      ? 'That was the last one. You are debt-free.'

  // ---------- shared: log payment ----------
  function logPayment(idx){
    const d = state.debts[idx];
    // small balances default to full clearance; otherwise the minimum
    const suggested = Number(d.balance) <= 400 ? Number(d.balance) : (d.minPayment || '');
    openSheet({
      title: 'Log payment — ' + d.name,
      saveLabel: 'Log payment',
      fields: [{ id:'amt', label:'Amount (£)', value: suggested, placeholder:'0' }],
      onSave: (v)=>{
        const val = parseFloat(v.amt);
        if (isNaN(val) || val<=0){ toast('Enter an amount above zero'); return false; }
        const prevBalance = Number(d.balance);
        const activityTxt = `Paid ${fmt2(val)} toward ${d.name}`;
        d.payments = d.payments||[];
        d.payments.push({ d:new Date().toISOString().slice(0,10), amt:val });
        d.balance = Math.max(0, prevBalance - val);
        logActivity(activityTxt);
        const cleared = d.balance <= 0;
        const clearedTxt = `${d.name} fully cleared 🎉`;
        if (cleared){ logActivity(clearedTxt); }
        save(); renderAll();
        const undoFn = ()=>{
          d.balance = prevBalance;
          d.payments.pop();
          if (cleared) dropActivityHead(clearedTxt);
          dropActivityHead(activityTxt);
          document.getElementById('celebrate').classList.remove('show');
        };
        if (cleared){ celebrate(d.name); toast(`${d.name} cleared`, undoFn); }
        else toast(`${fmt2(val)} logged — ${d.name} now ${fmt2(d.balance)}`, undoFn);
      }
    });
  }
