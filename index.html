<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#10141a">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg: #10141a;
    --panel: #171d26;
    --panel-hi: #1e2632;
    --line: #2a3341;
    --text: #e8e6e0;
    --text-dim: #8b93a0;
    --amber: #d9a054;
    --amber-dim: #6b5535;
    --sage: #8fb996;
    --sage-dim: #3f5844;
    --clay: #c1666b;
    --clay-dim: #5c3235;
    --mono: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
    --sans: 'Space Grotesk', 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; }
  #app-root {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 84px;
    position: relative;
  }
  .header {
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--line);
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 14px 0;
    letter-spacing: -0.01em;
  }
  .runway {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .runway-top { display:flex; justify-content: space-between; color: var(--text-dim); margin-bottom: 8px; font-size: 11px; letter-spacing: 0.06em;}
  .runway-bar { font-size: 15px; letter-spacing: -1px; color: var(--amber); white-space: nowrap; overflow: hidden; }
  .runway-bar .filled { color: var(--amber); }
  .runway-bar .empty { color: var(--line); }
  .runway-stats { display:flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: var(--text-dim); }
  .runway-stats b { color: var(--text); font-weight: 500; }

  .tabs {
    display: flex;
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--panel);
    border-top: 1px solid var(--line);
    z-index: 20;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 12px 0 10px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    cursor: pointer;
    border-top: 2px solid transparent;
    text-transform: uppercase;
  }
  .tab.active { color: var(--amber); border-top: 2px solid var(--amber); }
  .tab:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible { outline: 2px solid var(--amber); outline-offset: 1px; }

  .view { padding: 16px 18px 8px; }
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin: 18px 0 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-label:first-child { margin-top: 0; }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 13px 14px;
    margin-bottom: 10px;
  }
  .card-row { display: flex; justify-content: space-between; align-items: baseline; }
  .card-name { font-weight: 500; font-size: 14.5px; }
  .card-meta { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 3px; }
  .card-amount { font-family: var(--mono); font-size: 15px; font-weight: 500; }
  .badge {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.05em;
    padding: 2px 6px; border-radius: 4px; text-transform: uppercase;
  }
  .badge.priority { background: var(--amber-dim); color: var(--amber); }
  .badge.ok { background: var(--sage-dim); color: var(--sage); }
  .badge.over { background: var(--clay-dim); color: var(--clay); }

  .bar-track { height: 5px; background: var(--line); border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }

  .mini-btn {
    background: transparent; border: 1px solid var(--line); color: var(--text-dim);
    font-family: var(--mono); font-size: 11px; padding: 3px 8px; border-radius: 5px; cursor: pointer;
  }
  .mini-btn:hover { border-color: var(--amber); color: var(--amber); }

  .add-form {
    background: var(--panel-hi); border: 1px solid var(--line); border-radius: 8px;
    padding: 14px; margin-top: 8px; display: none;
  }
  .add-form.open { display: block; }
  .field { margin-bottom: 10px; }
  .field label { display:block; font-family: var(--mono); font-size: 10.5px; color: var(--text-dim); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
  .field input, .field select {
    width: 100%; background: var(--bg); border: 1px solid var(--line); color: var(--text);
    padding: 9px 10px; border-radius: 6px; font-family: var(--sans); font-size: 14px;
  }
  .row2 { display: flex; gap: 8px; }
  .row2 .field { flex: 1; }

  .btn {
    width: 100%; background: var(--amber); color: #10141a; border: none;
    padding: 10px 0; border-radius: 6px; font-weight: 600; font-size: 13.5px; cursor: pointer;
    font-family: var(--sans);
  }
  .btn.ghost { background: transparent; border: 1px solid var(--line); color: var(--text-dim); margin-top: 6px; }
  .btn.danger { background: var(--clay-dim); color: var(--clay); }

  .empty-state { font-family: var(--mono); font-size: 12px; color: var(--text-dim); padding: 20px 0; text-align: center; border: 1px dashed var(--line); border-radius: 8px; }

  .plus {
    background: var(--panel); border: 1px solid var(--line); color: var(--amber);
    width: 100%; padding: 9px 0; border-radius: 8px; font-family: var(--mono); font-size: 12px;
    cursor: pointer; letter-spacing: 0.04em; margin-top: 4px;
  }

  .overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px 13px; }
  .stat-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-value { font-family: var(--mono); font-size: 19px; margin-top: 5px; }

  .save-note { font-family: var(--mono); font-size: 10.5px; color: var(--text-dim); text-align:center; margin-top: 14px; opacity: 0.7; }
  ::placeholder { color: #4a5364; }
</style>

<div id="app-root">
  <div class="header">
    <div class="eyebrow">// finances</div>
    <div class="h1">Runway <span id="storage-badge" class="badge over" style="display:none; vertical-align:middle; font-weight:400;"></span></div>
    <div class="runway">
      <div class="runway-top"><span>DEBT CLEARED</span><span id="runway-pct">0%</span></div>
      <div class="runway-bar" id="runway-bar">[--------------------]</div>
      <div class="runway-stats">
        <span>Owed: <b id="runway-owed">£0</b></span>
        <span>Cleared: <b id="runway-cleared">£0</b></span>
      </div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-view="overview">Overview</div>
    <div class="tab" data-view="debts">Debts</div>
    <div class="tab" data-view="budget">Budget</div>
  </div>

  <div class="view" id="view-overview"></div>
  <div class="view" id="view-debts" style="display:none"></div>
  <div class="view" id="view-budget" style="display:none"></div>
</div>

<script>
(function(){
  const STORE_KEY = 'finance-tracker-state-v1';
  let state = { debts: [], budgetIncome: 0, categories: [] };
  let loaded = false;
  let storageOk = null; // null = unknown, true = working, false = failing
  let warnedOnce = false;

  async function load(){
    // Prefer Claude's storage when running inside Claude; fall back to browser localStorage when standalone
    try {
      if (window.storage && window.storage.get){
        const res = await window.storage.get(STORE_KEY, false);
        if (res && res.value) { state = JSON.parse(res.value); storageOk = true; }
      } else {
        const raw = localStorage.getItem(STORE_KEY);
        if (raw) { state = JSON.parse(raw); storageOk = true; }
      }
    } catch(e) { /* no saved state yet, or storage unavailable */ }
    loaded = true;
    renderAll();
  }
  async function save(){
    const payload = JSON.stringify(state);
    try {
      if (window.storage && window.storage.set){
        await window.storage.set(STORE_KEY, payload, false);
        // verify the write actually landed — some clients fail silently
        const check = await window.storage.get(STORE_KEY, false);
        storageOk = !!(check && check.value === payload);
      } else {
        localStorage.setItem(STORE_KEY, payload);
        storageOk = localStorage.getItem(STORE_KEY) === payload;
      }
    } catch(e) {
      storageOk = false;
      if (!warnedOnce) { console.warn('Auto-save unavailable in this client — use Backup on the Overview tab.'); warnedOnce = true; }
    }
    updateStorageBadge();
  }
  function updateStorageBadge(){
    const el = document.getElementById('storage-badge');
    if (!el) return;
    if (storageOk === false){
      el.style.display = 'inline-block';
      el.textContent = 'auto-save off — use backup';
    } else {
      el.style.display = 'none';
    }
  }

  const fmt = n => '£' + Number(n||0).toLocaleString('en-GB', {maximumFractionDigits:0});

  // ---------- TABS ----------
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      ['overview','debts','budget'].forEach(v=>{
        document.getElementById('view-'+v).style.display = (v===t.dataset.view)?'block':'none';
      });
    });
  });

  // ---------- RUNWAY (signature element) ----------
  function renderRunway(){
    const totalOwed = state.debts.reduce((s,d)=>s+Number(d.balance||0),0);
    const totalOriginal = state.debts.reduce((s,d)=>s+Number(d.original||d.balance||0),0);
    const cleared = Math.max(totalOriginal - totalOwed, 0);
    const pct = totalOriginal > 0 ? Math.round((cleared/totalOriginal)*100) : 0;
    const blocks = 20;
    const filled = Math.round((pct/100)*blocks);
    let bar = '[';
    for(let i=0;i<blocks;i++) bar += (i<filled) ? '█' : '░';
    bar += ']';
    document.getElementById('runway-bar').textContent = bar;
    document.getElementById('runway-pct').textContent = pct + '%';
    document.getElementById('runway-owed').textContent = fmt(totalOwed);
    document.getElementById('runway-cleared').textContent = fmt(cleared);
  }

  // ---------- OVERVIEW ----------
  function renderOverview(){
    const el = document.getElementById('view-overview');
    const totalOwed = state.debts.reduce((s,d)=>s+Number(d.balance||0),0);
    const totalMin = state.debts.reduce((s,d)=>s+Number(d.minPayment||0),0);
    const totalAllocated = state.categories.reduce((s,c)=>s+Number(c.allocated||0),0);
    const totalSpent = state.categories.reduce((s,c)=>s+Number(c.spent||0),0);
    const leftover = Number(state.budgetIncome||0) - totalAllocated;

    let sortedDebts = [...state.debts].sort((a,b)=> Number(b.apr||0) - Number(a.apr||0));
    let priorityHtml = '<div class="empty-state">Add a debt to see your payoff priority</div>';
    if (sortedDebts.length){
      const top = sortedDebts[0];
      priorityHtml = `<div class="card">
        <div class="card-row">
          <div>
            <div class="card-name">${escapeHtml(top.name)}</div>
            <div class="card-meta">${top.apr}% APR · min ${fmt(top.minPayment)}/mo</div>
          </div>
          <span class="badge priority">avalanche target</span>
        </div>
      </div>`;
    }

    el.innerHTML = `
      <div class="section-label">Snapshot</div>
      <div class="overview-grid">
        <div class="stat"><div class="stat-label">Total owed</div><div class="stat-value">${fmt(totalOwed)}</div></div>
        <div class="stat"><div class="stat-label">Min payments/mo</div><div class="stat-value">${fmt(totalMin)}</div></div>
        <div class="stat"><div class="stat-label">Budgeted/mo</div><div class="stat-value">${fmt(totalAllocated)}</div></div>
        <div class="stat"><div class="stat-label">Left after budget</div><div class="stat-value" style="color:${leftover<0?'var(--clay)':'var(--sage)'}">${fmt(leftover)}</div></div>
      </div>
      <div class="section-label">Avalanche priority</div>
      ${priorityHtml}
      <div class="section-label">Spend so far</div>
      ${totalAllocated>0 ? `<div class="card">
        <div class="card-row"><span class="card-meta">${fmt(totalSpent)} of ${fmt(totalAllocated)} spent</span><span class="card-meta">${Math.round((totalSpent/totalAllocated)*100)||0}%</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.min((totalSpent/totalAllocated)*100,100)}%; background:${totalSpent>totalAllocated?'var(--clay)':'var(--sage)'}"></div></div>
      </div>` : '<div class="empty-state">Set up budget categories to track spend</div>'}
      <div class="section-label">Backup &amp; import</div>
      <div class="card">
        <div class="card-meta" style="margin-bottom:10px; margin-top:0;">Copy your data out as text, restore it later, or import debts &amp; budget categories from a spreadsheet (.xlsx / .csv).</div>
        <div class="row2">
          <button class="mini-btn" id="backup-copy" style="flex:1; padding:8px 0;">copy backup</button>
          <button class="mini-btn" id="backup-restore" style="flex:1; padding:8px 0;">restore</button>
          <button class="mini-btn" id="import-excel" style="flex:1; padding:8px 0;">import sheet</button>
        </div>
        <input type="file" id="excel-file" accept=".xlsx,.xls,.csv" style="display:none"/>
        <textarea id="backup-box" placeholder="Backup text appears here / paste here to restore" style="display:none; width:100%; margin-top:10px; background:var(--bg); border:1px solid var(--line); color:var(--text); border-radius:6px; font-family:var(--mono); font-size:11px; padding:8px; min-height:70px;"></textarea>
        <div id="backup-msg" class="card-meta" style="margin-top:8px; display:none;"></div>
      </div>
    `;

    const box = document.getElementById('backup-box');
    const msg = document.getElementById('backup-msg');
    function note(t, ok){
      msg.style.display = 'block';
      msg.style.color = ok ? 'var(--sage)' : 'var(--clay)';
      msg.textContent = t;
    }
    document.getElementById('backup-copy').onclick = async ()=>{
      const data = JSON.stringify(state);
      box.style.display = 'block';
      box.value = data;
      box.select();
      try {
        await navigator.clipboard.writeText(data);
        note('Copied to clipboard — paste it somewhere safe (notes app, message to yourself).', true);
      } catch(e) {
        note('Clipboard blocked — long-press the text above and copy it manually.', false);
      }
    };
    document.getElementById('backup-restore').onclick = ()=>{
      if (box.style.display !== 'block'){
        box.style.display = 'block';
        box.value = '';
        box.focus();
        note('Paste your backup text above, then tap restore again.', true);
        return;
      }
      try {
        const parsed = JSON.parse(box.value.trim());
        if (!parsed || typeof parsed !== 'object' || !Array.isArray(parsed.debts)) throw new Error('bad shape');
        state = { debts: parsed.debts||[], budgetIncome: Number(parsed.budgetIncome)||0, categories: parsed.categories||[] };
        save(); renderAll();
        note('Restored.', true);
      } catch(e) {
        note("That doesn't look like a valid backup — check you pasted the whole thing.", false);
      }
    };

    // ----- Spreadsheet import -----
    const fileInput = document.getElementById('excel-file');
    document.getElementById('import-excel').onclick = ()=>{
      if (typeof XLSX === 'undefined'){ note('Spreadsheet library failed to load — check your connection and reopen the app.', false); return; }
      fileInput.click();
    };
    fileInput.onchange = async (e)=>{
      const file = e.target.files[0];
      if (!file) return;
      try {
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, { type: 'array' });
        const cleanNum = v => {
          if (typeof v === 'number') return v;
          const n = parseFloat(String(v ?? '').replace(/[£$,%\s]/g, ''));
          return isNaN(n) ? 0 : n;
        };
        const norm = s => String(s ?? '').toLowerCase().replace(/[^a-z]/g,'');
        const NAME_H = ['name','debt','debtname','loan','account'];
        const BAL_H  = ['balance','amount','owed','outstanding','remaining'];
        const APR_H  = ['apr','rate','interest','interestrate','aprpercent'];
        const MIN_H  = ['minpayment','min','minimum','minimumpayment','monthlypayment','payment','monthly','permonth'];
        const CAT_H  = ['category','categoryname','budgetcategory','pot','potname'];
        const ALLOC_H= ['allocated','allocation','budget','budgeted','limit','monthlybudget'];
        const SPENT_H= ['spent','spend','used','actual'];
        const findCol = (cells, names) => cells.findIndex(c => names.includes(norm(c)));

        let newDebts = [], newCats = [];
        wb.SheetNames.forEach(sn => {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1, defval: '' });
          let mode = null, cols = {};
          rows.forEach(r => {
            const nameCol = findCol(r, NAME_H), balCol = findCol(r, BAL_H);
            const catCol = findCol(r, CAT_H), allocCol = findCol(r, ALLOC_H);
            // Is this row a header row? If so, switch parsing mode.
            if (nameCol >= 0 && balCol >= 0){
              mode = 'debt';
              cols = { name: nameCol, bal: balCol, apr: findCol(r, APR_H), min: findCol(r, MIN_H) };
              return;
            }
            if (catCol >= 0 && allocCol >= 0){
              mode = 'cat';
              cols = { name: catCol, alloc: allocCol, spent: findCol(r, SPENT_H) };
              return;
            }
            if (!mode) return;
            const label = String(r[cols.name] ?? '').trim();
            // Blank name or a totals/section row ends or skips within the current block
            if (!label){ return; }
            if (norm(label).startsWith('total')) { mode = null; return; }
            if (mode === 'debt'){
              const bal = cleanNum(r[cols.bal]);
              if (bal > 0) newDebts.push({
                name: label, balance: bal, original: bal,
                apr: cols.apr >= 0 ? cleanNum(r[cols.apr]) : 0,
                minPayment: cols.min >= 0 ? cleanNum(r[cols.min]) : 0
              });
            } else if (mode === 'cat'){
              const alloc = cleanNum(r[cols.alloc]);
              if (alloc > 0) newCats.push({
                name: label, allocated: alloc,
                spent: cols.spent >= 0 ? cleanNum(r[cols.spent]) : 0
              });
            }
          });
        });
        if (!newDebts.length && !newCats.length){
          note('No recognisable rows found. Debts need Name + Balance columns (APR and Min Payment optional). Budget rows need Category + Allocated columns.', false);
          fileInput.value = '';
          return;
        }
        const replace = (state.debts.length || state.categories.length)
          ? confirm(`Found ${newDebts.length} debt(s) and ${newCats.length} budget categorie(s).\n\nOK = REPLACE existing data\nCancel = ADD to existing data`)
          : true;
        if (replace){
          if (newDebts.length) state.debts = newDebts;
          if (newCats.length) state.categories = newCats;
        } else {
          state.debts = state.debts.concat(newDebts);
          state.categories = state.categories.concat(newCats);
        }
        save(); renderAll();
        // renderAll rebuilds this view, so re-show the confirmation there
        const msg2 = document.getElementById('backup-msg');
        if (msg2){ msg2.style.display='block'; msg2.style.color='var(--sage)'; msg2.textContent = `Imported ${newDebts.length} debt(s), ${newCats.length} categorie(s) from ${file.name}.`; }
      } catch(err) {
        note('Could not read that file — make sure it\'s a valid .xlsx or .csv.', false);
      }
      fileInput.value = '';
    };
    updateStorageBadge();
  }

  // ---------- DEBTS ----------
  function renderDebts(){
    const el = document.getElementById('view-debts');
    const sorted = [...state.debts].sort((a,b)=> Number(b.apr||0) - Number(a.apr||0));
    let list = sorted.length ? '' : '<div class="empty-state">No debts added yet</div>';
    sorted.forEach((d, idx)=>{
      const realIdx = state.debts.indexOf(d);
      const original = Number(d.original||d.balance||0);
      const pctPaid = original>0 ? Math.min(100, Math.round(((original-Number(d.balance||0))/original)*100)) : 0;
      list += `<div class="card">
        <div class="card-row">
          <div>
            <div class="card-name">${escapeHtml(d.name)} ${idx===0?'<span class=\"badge priority\">next</span>':''}</div>
            <div class="card-meta">${d.apr}% APR · min ${fmt(d.minPayment)}/mo</div>
          </div>
          <div style="text-align:right">
            <div class="card-amount">${fmt(d.balance)}</div>
            <button class="mini-btn" data-remove-debt="${realIdx}" style="margin-top:6px">remove</button>
          </div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pctPaid}%; background:var(--amber)"></div></div>
      </div>`;
    });
    el.innerHTML = `
      <div class="section-label">Debts <span style="font-weight:400">sorted highest APR first</span></div>
      ${list}
      <button class="plus" id="show-debt-form">+ add debt</button>
      <div class="add-form" id="debt-form">
        <div class="field"><label>Name</label><input id="d-name" placeholder="e.g. Credit union loan"/></div>
        <div class="row2">
          <div class="field"><label>Balance (£)</label><input id="d-balance" type="number" inputmode="decimal" placeholder="0"/></div>
          <div class="field"><label>APR (%)</label><input id="d-apr" type="number" inputmode="decimal" placeholder="0"/></div>
        </div>
        <div class="field"><label>Min payment/mo (£)</label><input id="d-min" type="number" inputmode="decimal" placeholder="0"/></div>
        <button class="btn" id="save-debt">Save debt</button>
        <button class="btn ghost" id="cancel-debt">Cancel</button>
      </div>
    `;
    document.getElementById('show-debt-form').onclick = ()=> document.getElementById('debt-form').classList.add('open');
    document.getElementById('cancel-debt').onclick = ()=> document.getElementById('debt-form').classList.remove('open');
    document.getElementById('save-debt').onclick = ()=>{
      const name = document.getElementById('d-name').value.trim();
      const balance = parseFloat(document.getElementById('d-balance').value)||0;
      const apr = parseFloat(document.getElementById('d-apr').value)||0;
      const minPayment = parseFloat(document.getElementById('d-min').value)||0;
      if (!name || balance<=0) return;
      state.debts.push({ name, balance, original: balance, apr, minPayment });
      save(); renderAll();
    };
    el.querySelectorAll('[data-remove-debt]').forEach(btn=>{
      btn.onclick = ()=>{
        state.debts.splice(parseInt(btn.dataset.removeDebt),1);
        save(); renderAll();
      };
    });
  }

  // ---------- BUDGET ----------
  function renderBudget(){
    const el = document.getElementById('view-budget');
    let list = state.categories.length ? '' : '<div class="empty-state">No budget categories yet</div>';
    state.categories.forEach((c, idx)=>{
      const spent = Number(c.spent||0), allocated = Number(c.allocated||0);
      const pct = allocated>0 ? Math.round((spent/allocated)*100) : 0;
      const over = spent > allocated && allocated>0;
      list += `<div class="card">
        <div class="card-row">
          <div>
            <div class="card-name">${escapeHtml(c.name)}</div>
            <div class="card-meta">${fmt(spent)} of ${fmt(allocated)}</div>
          </div>
          <span class="badge ${over?'over':'ok'}">${over?'over':pct+'%'}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.min(pct,100)}%; background:${over?'var(--clay)':'var(--sage)'}"></div></div>
        <div class="row2" style="margin-top:10px">
          <button class="mini-btn" data-spend="${idx}">+ log spend</button>
          <button class="mini-btn" data-remove-cat="${idx}">remove</button>
        </div>
      </div>`;
    });
    el.innerHTML = `
      <div class="section-label">Monthly income</div>
      <div class="card">
        <input id="income-input" type="number" inputmode="decimal" value="${state.budgetIncome||''}" placeholder="£ per month" style="width:100%; background:transparent; border:none; color:var(--text); font-family:var(--mono); font-size:16px;"/>
      </div>
      <div class="section-label">Categories</div>
      ${list}
      <button class="plus" id="show-cat-form">+ add category</button>
      <div class="add-form" id="cat-form">
        <div class="field"><label>Category name</label><input id="c-name" placeholder="e.g. Groceries"/></div>
        <div class="field"><label>Allocated (£/mo)</label><input id="c-allocated" type="number" inputmode="decimal" placeholder="0"/></div>
        <button class="btn" id="save-cat">Save category</button>
        <button class="btn ghost" id="cancel-cat">Cancel</button>
      </div>
    `;
    document.getElementById('income-input').onchange = (e)=>{
      state.budgetIncome = parseFloat(e.target.value)||0;
      save(); renderRunway(); renderOverview();
    };
    document.getElementById('show-cat-form').onclick = ()=> document.getElementById('cat-form').classList.add('open');
    document.getElementById('cancel-cat').onclick = ()=> document.getElementById('cat-form').classList.remove('open');
    document.getElementById('save-cat').onclick = ()=>{
      const name = document.getElementById('c-name').value.trim();
      const allocated = parseFloat(document.getElementById('c-allocated').value)||0;
      if (!name) return;
      state.categories.push({ name, allocated, spent: 0 });
      save(); renderAll();
    };
    el.querySelectorAll('[data-remove-cat]').forEach(btn=>{
      btn.onclick = ()=>{ state.categories.splice(parseInt(btn.dataset.removeCat),1); save(); renderAll(); };
    });
    el.querySelectorAll('[data-spend]').forEach(btn=>{
      btn.onclick = ()=>{
        const idx = parseInt(btn.dataset.spend);
        const amt = prompt('Log spend for "' + state.categories[idx].name + '" (£):');
        const val = parseFloat(amt);
        if (!isNaN(val) && val>0){
          state.categories[idx].spent = Number(state.categories[idx].spent||0) + val;
          save(); renderAll();
        }
      };
    });
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function renderAll(){
    if (!loaded) return;
    renderRunway();
    renderOverview();
    renderDebts();
    renderBudget();
  }

  load();
})();
</script>
