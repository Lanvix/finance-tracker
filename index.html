  // ================= HOME =================
  function renderHome(){
    const el = document.getElementById('view-home');
    if (!state.onboarded){ renderOnboarding(el); return; }
    const m = money();
    const totalOwed = state.debts.reduce((s,d)=>s+Number(d.balance||0),0);
    const totalOriginal = state.debts.reduce((s,d)=>s+Number(d.original||d.balance||0),0);
    const clearedPct = totalOriginal>0 ? Math.round(((totalOriginal-totalOwed)/totalOriginal)*100) : 0;
    const sim = simulate(state.strategy, state.extraPayment, 0);
    const alerts = buildAlerts();
    const move = nextBestMove();
    const blocks=20, filled=Math.round((clearedPct/100)*blocks);
    let bar='['; for(let i=0;i<blocks;i++) bar += i<filled?'█':'░'; bar+=']';

    const newMonthCard = checkNewMonth() ? `
      <div class="alert info">
        <div style="flex:1">
          <div class="t-card" style="font-size:15px">A new month has started</div>
          <div class="t-help">Reset category spending and bill statuses to begin ${MONTHS[new Date().getMonth()]} fresh? Your allocations stay as they are.</div>
          <button class="btn sm" style="margin-top:10px" id="home-new-month">Start ${MONTHS[new Date().getMonth()]}</button>
        </div>
      </div>` : '';

    el.innerHTML = `
      ${newMonthCard}
      <div class="card hi" style="text-align:center; padding:22px 16px;">
        ${state.debts.length && !activeDebts().length
          ? `<div class="t-micro" style="text-transform:uppercase; letter-spacing:0.08em;">you did it</div>
             <div class="hero-num">Debt-free ✓</div>
             <div class="t-help" style="margin-top:6px;">${fmt(totalOriginal)} cleared. Runway's job now is the other direction — your net position is ${(()=>{ const np=netPosition(); return (np.net<0?'−':'')+fmt(Math.abs(np.net)); })()} and every month it climbs. Goals and accounts live on the Budget and More tabs.</div>`
          : sim && sim.finished
          ? `<div class="t-micro" style="text-transform:uppercase; letter-spacing:0.08em;">debt-free</div>
             <div class="hero-num">${monthLabel(sim.months)}</div>
             <div class="t-help" style="margin-top:4px;">${sim.months} months away · ${fmt(totalOwed)} still owed</div>`
          : state.debts.length
            ? `<div class="hero-num" style="color:var(--clay)">no clear date</div>
               <div class="t-help" style="margin-top:4px;">current payments don't clear the debt — <a href="#" id="home-goto-plan" style="color:var(--amber)">fix the plan</a></div>`
            : `<div class="t-card">Welcome to Runway</div>
               <div class="t-help" style="margin-top:6px;">Add your debts and income and it'll tell you where you stand, what to pay first, and when you'll be free.</div>`}
        <div style="font-family:var(--mono); font-size:15px; letter-spacing:-1px; color:var(--amber); margin-top:14px;">${bar}</div>
        <div class="t-micro" style="margin-top:6px;">${clearedPct}% of original debt cleared</div>
      </div>

      ${move ? `<div class="card" style="border-left:3px solid var(--amber);">
        <div class="t-micro" style="text-transform:uppercase; letter-spacing:0.08em;">next best move</div>
        <div class="t-card" style="margin-top:6px;">${esc(move.title)}</div>
        <div class="t-help" style="margin-top:6px;">${esc(move.why)}</div>
      </div>` : ''}

      ${alerts.length ? `<div class="section"><span class="t-section">Needs attention</span></div>
        ${alerts.map(a=>`<div class="alert ${a.level==='info'?'info':''}">
          <div><div style="font-size:14.5px; font-weight:600;">${esc(a.title)}</div>
          <div class="t-help">${esc(a.body)}</div></div></div>`).join('')}` : ''}

      <div class="section"><span class="t-section">This month</span></div>
      <div class="grid2">
        <div class="stat"><div class="t-micro">free cash left</div><div class="t-stat" style="color:${m.freeCash<0?'var(--clay)':'var(--sage)'}">${fmt(m.freeCash)}</div><div class="t-micro">after bills, minimums, extra &amp; goals</div></div>
        <div class="stat"><div class="t-micro">total owed</div><div class="t-stat">${fmt(totalOwed)}</div><div class="t-micro">${activeDebts().length} active debt${activeDebts().length===1?'':'s'}</div></div>
        <div class="stat"><div class="t-micro">committed monthly</div><div class="t-stat">${fmt(m.billsTotal+m.minTotal)}</div><div class="t-micro">bills ${fmt(m.billsTotal)} + minimums ${fmt(m.minTotal)}</div></div>
        <div class="stat"><div class="t-micro">attacking debt with</div><div class="t-stat" style="color:var(--amber)">${fmt(m.extra)}</div><div class="t-micro">extra per month — set on Plan</div></div>
      </div>
      ${(()=>{
        const np = netPosition();
        if (!state.accounts.length && !state.goals.length) return '';
        const prev = state.snapshots.length>1 ? state.snapshots[state.snapshots.length-2] : (state.snapshots.length===1 && state.snapshots[0].k!==monthKeyNow() ? state.snapshots[0] : null);
        const delta = prev ? np.net - prev.net : null;
        return `<div class="card" style="margin-top:12px;">
          <div class="card-row">
            <div><div class="t-micro" style="text-transform:uppercase; letter-spacing:0.08em;">net position</div>
            <div class="t-stat" style="color:${np.net<0?'var(--clay)':'var(--sage)'}; margin-top:4px;">${np.net<0?'−':''}${fmt(Math.abs(np.net))}</div>
            <div class="t-micro">${fmt(np.assets)} in accounts &amp; savings − ${fmt(np.owed)} owed</div></div>
            ${delta!=null && Math.abs(delta)>0.5 ? `<span class="badge ${delta>=0?'ok':'warn'}">${delta>=0?'+':'−'}${fmt(Math.abs(delta))} vs last month</span>` : ''}
          </div>
          <div class="t-micro" style="margin-top:8px;">Every payment moves this up — negative is normal mid-payoff. Manage accounts in More.</div>
        </div>`;
      })()}

      <div class="section"><span class="t-section">Quick actions</span></div>
      <div class="quick-actions">
        <button class="qa" id="qa-pay">Log a payment<div class="micro t-micro">reduce a debt</div></button>
        <button class="qa" id="qa-spend">Log spending<div class="micro t-micro">against a category</div></button>
        <button class="qa" id="qa-debt">Add a debt<div class="micro t-micro">card, loan, BNPL…</div></button>
        <button class="qa" id="qa-bill">Add a bill<div class="micro t-micro">recurring commitment</div></button>
      </div>

      ${state.activity.length ? `<div class="section"><span class="t-section">Recent activity</span><button class="mini-btn" id="home-all-activity">see all</button></div>
      <div class="card" style="padding:6px 16px;">
        ${state.activity.slice(0,4).map(a=>`<div class="activity-item"><span>${esc(a.txt)}</span><span class="t-micro">${a.d.slice(5)}</span></div>`).join('')}
      </div>` : ''}
    `;
    const gp = document.getElementById('home-goto-plan');
    if (gp) gp.onclick = (e)=>{ e.preventDefault(); goTab('plan'); };
    const nm = document.getElementById('home-new-month');
    if (nm) nm.onclick = startNewMonth;
    const aa = document.getElementById('home-all-activity');
    if (aa) aa.onclick = ()=> goTab('more');
    document.getElementById('qa-pay').onclick = ()=>{
      const act = activeDebts();
      if (!act.length){ toast('No active debts — add one first'); return; }
      goTab('debts');
    };
    document.getElementById('qa-spend').onclick = ()=>{ goTab('budget'); };
    document.getElementById('qa-debt').onclick = ()=>{ goTab('debts'); setTimeout(()=>{ const b=document.getElementById('show-debt-form'); if(b) b.click(); }, 50); };
    document.getElementById('qa-bill').onclick = ()=>{ goTab('budget'); setTimeout(()=>{ const b=document.getElementById('show-bill-form'); if(b) b.click(); }, 50); };
  }

  // ================= PLAN =================
  function renderPlan(){
    const el = document.getElementById('view-plan');
    const simMain = simulate(state.strategy, state.extraPayment, 0);
    if (!simMain){
      el.innerHTML = `<div class="empty">Add debts on the Debts tab and your payoff plan, comparisons and what-if tools appear here.</div>`;
      return;
    }
    const other = state.strategy==='avalanche' ? 'snowball' : 'avalanche';
    const simOther = simulate(other, state.extraPayment, 0);
    const simBase = simulate(state.strategy, 0, 0);
    const sim50 = simulate(state.strategy, state.extraPayment+50, 0);
    const sim100 = simulate(state.strategy, state.extraPayment+100, 0);
    const lump = Number(state.lumpSum)||0;
    const simLump = lump>0 ? simulate(state.strategy, state.extraPayment, lump) : null;
    const totalOwed = activeDebts().reduce((s,d)=>s+Number(d.balance),0);

    const stratWhy = state.strategy==='avalanche'
      ? `Avalanche targets the highest interest rate first — it's the cheapest route mathematically. Trade-off: your first cleared debt may take longer, so it needs patience.`
      : state.strategy==='snowball'
      ? `Snowball targets the smallest balance first — quick wins keep motivation up. Trade-off: it usually costs a bit more in interest than avalanche.`
      : state.strategy==='promo'
      ? `Promo-first clears debts with expiring 0% deals before anything else, soonest deadline first, then falls back to highest rate. Use it when beating a promo cliff matters more than pure interest maths.`
      : `Custom means you choose the order — use the arrows on the Debts tab. Useful when something matters more than maths: a debt to family, collateral being held, or a promo you're managing by hand.`;
    const stratDiff = (simOther && simOther.finished && simMain.finished) ? simOther.totalInterest - simMain.totalInterest : null;

    const scenRow = (label, s) => s && s.finished
      ? `<tr><td>${label}</td><td>${monthLabel(s.months)}</td><td>${s.months}mo</td><td>${fmt(s.totalInterest)}</td></tr>`
      : `<tr><td>${label}</td><td colspan="3" style="color:var(--clay)">never clears</td></tr>`;

    el.innerHTML = `
      <div class="section"><span class="t-section">Strategy</span></div>
      <div class="card">
        <div class="strategy-toggle">
          <button id="strat-aval" class="${state.strategy==='avalanche'?'active':''}">Avalanche</button>
          <button id="strat-snow" class="${state.strategy==='snowball'?'active':''}">Snowball</button>
          <button id="strat-promo" class="${state.strategy==='promo'?'active':''}">Promo first</button>
          <button id="strat-cust" class="${state.strategy==='custom'?'active':''}">Custom</button>
        </div>
        <div class="t-help">${stratWhy}</div>
        ${stratDiff!=null && Math.abs(stratDiff)>0.5 ? `<div class="t-help" style="margin-top:8px; color:${stratDiff>0?'var(--sage)':'var(--clay)'}">Right now, ${state.strategy} ${stratDiff>0?'saves you':'costs you'} ${fmt(Math.abs(stratDiff))} in interest compared to ${other}.</div>` : ''}
        <div class="t-help" style="margin-top:8px; color:var(--text-3);">Promo deadlines are handled automatically — a 0% debt jumps up the priority order the moment its rate flips.</div>
      </div>

      <div class="section"><span class="t-section">Your plan</span></div>
      <div class="card">
        <div class="field" style="margin-bottom:8px;">
          <label>Extra toward debt each month (£)</label>
          <input id="extra-input" type="number" inputmode="decimal" value="${state.extraPayment||''}" placeholder="0"/>
        </div>
        ${simMain.finished
          ? `<div class="t-help">With ${fmt(state.extraPayment)} extra a month you're debt-free in <b style="color:var(--sage)">${monthLabel(simMain.months)}</b>, paying ${fmt(simMain.totalInterest)} interest in total (${fmt(totalOwed+simMain.totalInterest)} altogether).</div>
             ${simBase && simBase.finished && state.extraPayment>0 ? `<div class="t-help" style="margin-top:6px;">That's <b>${simBase.months-simMain.months} months sooner</b> and <b>${fmt(simBase.totalInterest-simMain.totalInterest)} less interest</b> than paying only the minimums.</div>` : ''}`
          : `<div class="t-help" style="color:var(--clay)">These payments never clear the debt — interest outruns them. Increase the extra amount.</div>`}
        <div class="chart-wrap">${sparkline([
          simBase ? {series:simBase.series, color:'#7d8695', dash:'4 4'} : null,
          {series:simMain.series, color:'#dca75e'}
        ].filter(Boolean))}</div>
        <div class="t-micro" style="margin-top:4px;">amber: your plan · grey dashes: minimums only</div>
      </div>

      <div class="section"><span class="t-section">Compare scenarios</span></div>
      <div class="card">
        <table class="scen-table">
          <tr><th>plan</th><th>debt-free</th><th>time</th><th>interest</th></tr>
          ${scenRow('Minimums only', simBase)}
          ${scenRow('Current (+'+fmt(state.extraPayment)+')', simMain)}
          ${scenRow('+£50 more', sim50)}
          ${scenRow('+£100 more', sim100)}
        </table>
        ${sim50 && sim50.finished && simMain.finished ? `<div class="t-help" style="margin-top:10px;">Adding £50/month cuts ${simMain.months-sim50.months} month${simMain.months-sim50.months===1?'':'s'} off and saves ${fmt(simMain.totalInterest-sim50.totalInterest)}.</div>` : ''}
      </div>

      <div class="section"><span class="t-section">What if: lump sum</span></div>
      <div class="card">
        <div class="field" style="margin-bottom:8px;">
          <label>One-off payment today (£)</label>
          <input id="lump-input" type="number" inputmode="decimal" value="${state.lumpSum||''}" placeholder="e.g. 500"/>
        </div>
        ${simLump && simLump.finished && simMain.finished
          ? `<div class="t-help">A ${fmt(lump)} lump sum on your ${state.strategy} target today brings debt-free forward <b>${simMain.months-simLump.months} month${simMain.months-simLump.months===1?'':'s'}</b> and saves <b>${fmt(simMain.totalInterest-simLump.totalInterest)}</b> in interest. This is a what-if — log it as a real payment on the Debts tab when you make it.</div>`
          : `<div class="t-help" style="color:var(--text-3)">Enter an amount to see what a one-off payment would do to your date and interest.</div>`}
      </div>

      ${state.goals.length ? `<div class="section"><span class="t-section">Goals trade-off</span></div>
      <div class="card">
        ${(()=>{
          const gm = state.goals.reduce((s,g)=>s+Number(g.monthly||0),0);
          if (gm<=0) return '<div class="t-help" style="color:var(--text-3)">Your goals have no monthly contributions set.</div>';
          const simNoGoals = simulate(state.strategy, state.extraPayment+gm, 0);
          return simNoGoals && simNoGoals.finished && simMain.finished
            ? `<div class="t-help">You're putting ${fmt(gm)}/month into goals. Pausing that and attacking debt instead would make you debt-free <b>${simMain.months-simNoGoals.months} month${simMain.months-simNoGoals.months===1?'':'s'} sooner</b> and save ${fmt(simMain.totalInterest-simNoGoals.totalInterest)} interest. Whether that trade is worth it is up to you — an emergency cushion has value no spreadsheet shows.</div>`
            : '';
        })()}
      </div>` : ''}
    `;
    document.getElementById('strat-aval').onclick = ()=>{ state.strategy='avalanche'; save(); renderAll(); };
    document.getElementById('strat-snow').onclick = ()=>{ state.strategy='snowball'; save(); renderAll(); };
    document.getElementById('strat-promo').onclick = ()=>{ state.strategy='promo'; save(); renderAll(); };
    document.getElementById('strat-cust').onclick = ()=>{
      // seed custom order from current sorted order so it starts sensible
      const now2 = new Date();
      const sorted = [...activeDebts()].sort(debtSorter(state.strategy==='custom'?'avalanche':state.strategy, now2));
      sorted.forEach((d,i)=> d.ord = i);
      state.debts.filter(d=>Number(d.balance)<=0).forEach((d,i)=> d.ord = sorted.length+i);
      state.strategy='custom'; save(); renderAll();
    };
    document.getElementById('extra-input').onchange = e=>{ state.extraPayment = Math.max(0, parseFloat(e.target.value)||0); logActivity(`Set extra debt payment to ${fmt(state.extraPayment)}/mo`); save(); renderAll(); };
    document.getElementById('lump-input').onchange = e=>{ state.lumpSum = Math.max(0, parseFloat(e.target.value)||0); save(); renderPlan(); };
  }

  // ================= DEBTS =================
  function renderDebts(){
    const el = document.getElementById('view-debts');
    const now = new Date();
    const simMain = simulate(state.strategy, state.extraPayment, 0);
    const act = activeDebts().sort(debtSorter(state.strategy, now));
    const done = state.debts.filter(d=>Number(d.balance)<=0);

    let list = act.length||done.length ? '' : `<div class="empty">No debts yet. Add each card, loan or plan below — balance, rate and minimum payment is all it needs to build your payoff plan.</div>`;
    act.forEach((d, idx)=>{
      const realIdx = state.debts.indexOf(d);
      const original = Number(d.original||d.balance||0);
      const pctPaid = original>0 ? Math.min(100, Math.round(((original-Number(d.balance))/original)*100)) : 0;
      const projM = simMain && simMain.payoffs[d.name];
      let promoLine='';
      if (d.promoEnd){
        const end=new Date(d.promoEnd), days=Math.ceil((end-now)/86400000);
        const projDate = projM!=null ? new Date(now.getFullYear(), now.getMonth()+projM, 1) : null;
        const atRisk = projDate && projDate>end;
        promoLine = days>0
          ? `<div class="meta" style="color:${atRisk||days<60?'var(--clay)':'var(--text-2)'}">0% ends ${end.getDate()} ${MONTHS[end.getMonth()]} · ${days} days left${atRisk?' · plan misses this deadline':''}</div>`
          : `<div class="meta" style="color:var(--clay)">Promo over — now charging ${d.postPromoApr??d.apr}%</div>`;
      }
      const interestMo = Number(d.balance)*(effApr(d,now)/100/12);
      const costLine = d.fixedInterest
        ? ' · fixed loan — interest already built into the balance'
        : (interestMo>0.5 ? ' · costing about '+fmt2(interestMo)+'/mo in interest right now' : '');
      list += `<div class="card">
        <div class="card-row">
          <div style="min-width:0">
            <div class="t-card">${esc(d.name)} ${idx===0?'<span class="badge priority">pay first</span>':''}</div>
            <div class="meta">${effApr(d,now)}% · min ${fmt2(d.minPayment)}/mo${projM!=null && simMain.finished ? ' · gone by '+monthLabel(projM) : ''}</div>
            ${promoLine}
          </div>
          <div class="t-stat">${fmt2(d.balance)}</div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pctPaid}%; background:var(--amber)"></div></div>
        <div class="micro">${pctPaid}% of the original ${fmt(original)} paid off${costLine}</div>
        <div class="row2" style="margin-top:12px">
          <button class="mini-btn accent" data-pay="${realIdx}">Log payment</button>
          <button class="mini-btn" data-edit="${realIdx}">Edit</button>
          ${state.strategy==='custom' ? `
            <button class="ord-btn" data-move-up="${idx}" aria-label="Move up" ${idx===0?'disabled style="opacity:0.3"':''}>▲</button>
            <button class="ord-btn" data-move-down="${idx}" aria-label="Move down" ${idx===act.length-1?'disabled style="opacity:0.3"':''}>▼</button>` : ''}
        </div>
        <details class="debt-detail">
          <summary>History &amp; more</summary>
          ${d.payments && d.payments.length
            ? `<div class="pay-history">${d.payments.slice(-8).reverse().map(p=>`<div><span>${p.d}</span><span>${fmt2(p.amt)}</span></div>`).join('')}</div>
               <div class="micro">${d.payments.length} payment${d.payments.length===1?'':'s'} logged · ${fmt2(d.payments.reduce((s,p)=>s+p.amt,0))} total</div>`
            : `<div class="t-help" style="color:var(--text-3); margin-top:6px;">No payments logged yet.</div>`}
          <button class="mini-btn" data-remove-debt="${realIdx}" style="margin-top:10px; border-color:var(--clay-dim); color:var(--clay);">Remove debt</button>
        </details>
      </div>`;
    });
    done.forEach(d=>{
      const realIdx = state.debts.indexOf(d);
      list += `<div class="card cleared"><div class="card-row">
        <div><div class="t-card">${esc(d.name)} <span class="badge ok">cleared ✓</span></div>
        <div class="meta">was ${fmt(d.original)}</div></div>
        <button class="mini-btn" data-remove-debt="${realIdx}">Remove</button>
      </div></div>`;
    });

    const editing = editingIndex!=null ? state.debts[editingIndex] : null;
    el.innerHTML = `
      <div class="section"><span class="t-section">Debts</span><span class="t-micro">${state.strategy} order</span></div>
      ${list}
      <button class="plus" id="show-debt-form">+ add debt</button>
      <div class="form ${editing?'open':''}" id="debt-form">
        <div class="field"><label>Name</label><input id="d-name" placeholder="e.g. Credit union loan" value="${editing?esc(editing.name):''}"/></div>
        <div class="row2">
          <div class="field"><label>Balance (£)</label><input id="d-balance" type="number" inputmode="decimal" placeholder="0" value="${editing?editing.balance:''}"/></div>
          <div class="field"><label>APR now (%)</label><input id="d-apr" type="number" inputmode="decimal" placeholder="0" value="${editing?editing.apr:''}"/></div>
        </div>
        <div class="field"><label>Minimum payment / month (£)</label><input id="d-min" type="number" inputmode="decimal" placeholder="0" value="${editing?editing.minPayment:''}"/></div>
        <div class="row2">
          <div class="field"><label>0% promo ends (optional)</label><input id="d-promo" type="date" value="${editing&&editing.promoEnd?editing.promoEnd:''}"/></div>
          <div class="field"><label>Rate after promo (%)</label><input id="d-post-apr" type="number" inputmode="decimal" placeholder="—" value="${editing&&editing.postPromoApr!=null?editing.postPromoApr:''}"/></div>
        </div>
        <div class="field">
          <label style="display:flex; align-items:center; gap:10px; text-transform:none; font-size:13px; color:var(--text-2); cursor:pointer;">
            <input type="checkbox" id="d-fixed" ${editing&&editing.fixedInterest?'checked':''} style="width:auto; min-height:0; accent-color:var(--amber);"/>
            Interest already included in the balance (HP / fixed loan)
          </label>
          <div class="micro" style="margin-top:4px;">For car finance and fixed loans where interest is precomputed — overpaying reduces the balance but doesn't shrink interest, so it won't be prioritised for savings.</div>
        </div>
        <button class="btn" id="save-debt">${editing?'Update debt':'Save debt'}</button>
        <button class="btn ghost" id="cancel-debt">Cancel</button>
      </div>
    `;
    document.getElementById('show-debt-form').onclick = ()=>{ editingIndex=null; renderDebts(); document.getElementById('debt-form').classList.add('open'); };
    document.getElementById('cancel-debt').onclick = ()=>{ editingIndex=null; renderDebts(); };
    document.getElementById('save-debt').onclick = ()=>{
      const name = document.getElementById('d-name').value.trim();
      const balance = parseFloat(document.getElementById('d-balance').value)||0;
      const apr = parseFloat(document.getElementById('d-apr').value)||0;
      const minPayment = parseFloat(document.getElementById('d-min').value)||0;
      const promoEnd = document.getElementById('d-promo').value || null;
      const postRaw = document.getElementById('d-post-apr').value;
      const postPromoApr = postRaw==='' ? null : (parseFloat(postRaw)||0);
      const fixedInterest = document.getElementById('d-fixed').checked;
      if (!name){ toast('Give the debt a name'); return; }
      if (balance<=0){ toast('Balance needs to be above zero'); return; }
      if (editingIndex!=null){
        const d = state.debts[editingIndex];
        Object.assign(d, { name, balance, apr, minPayment, promoEnd, postPromoApr, fixedInterest });
        if (balance > Number(d.original||0)) d.original = balance;
        logActivity(`Edited ${name}`);
        editingIndex=null;
      } else {
        state.debts.push({ name, balance, original:balance, apr, minPayment, promoEnd, postPromoApr, fixedInterest, payments:[], ord:state.debts.length });
        logActivity(`Added debt: ${name} (${fmt(balance)})`);
      }
      save(); renderAll();
    };
    el.querySelectorAll('[data-remove-debt]').forEach(btn=>{
      btn.onclick = ()=>{ const i=parseInt(btn.dataset.removeDebt);
        if (confirm(`Remove "${state.debts[i].name}" entirely? Its history goes with it. (Paying it to zero keeps your progress instead.)`)){
          logActivity(`Removed debt: ${state.debts[i].name}`);
          state.debts.splice(i,1); editingIndex=null; save(); renderAll();
        } };
    });
    el.querySelectorAll('[data-edit]').forEach(btn=>{
      btn.onclick = ()=>{ editingIndex=parseInt(btn.dataset.edit); renderDebts(); document.getElementById('debt-form').scrollIntoView({behavior:'smooth'}); };
    });
    el.querySelectorAll('[data-pay]').forEach(btn=>{
      btn.onclick = ()=> logPayment(parseInt(btn.dataset.pay));
    });
    const swapOrd = (i, j) => {
      const sorted = activeDebts().sort(debtSorter('custom', now));
      if (!sorted[i] || !sorted[j]) return;
      const t = sorted[i].ord; sorted[i].ord = sorted[j].ord; sorted[j].ord = t;
      save(); renderAll();
    };
    el.querySelectorAll('[data-move-up]').forEach(btn=>{ btn.onclick = ()=> swapOrd(parseInt(btn.dataset.moveUp), parseInt(btn.dataset.moveUp)-1); });
    el.querySelectorAll('[data-move-down]').forEach(btn=>{ btn.onclick = ()=> swapOrd(parseInt(btn.dataset.moveDown), parseInt(btn.dataset.moveDown)+1); });
  }

  // ================= BUDGET =================
  function renderBudget(){
    const el = document.getElementById('view-budget');
    const now = new Date();
    const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    const monthPct = (now.getDate()/daysInMonth)*100;
    const m = money();

    const weekly = state.settings.budgetView === 'week';
    // current week: Monday start
    const dow = (now.getDay()+6)%7; // 0=Mon
    const weekStart = new Date(now); weekStart.setDate(now.getDate()-dow); weekStart.setHours(0,0,0,0);
    const weekPct = ((dow+1)/7)*100;
    const inWeek = iso => { const d = new Date(iso+'T12:00:00'); return d >= weekStart; };

    let catList = state.categories.length ? '' : `<div class="empty">No spending categories yet. Add the flexible ones — groceries, fuel, going out — and log spends against them as you go.</div>`;
    state.categories.forEach((c, idx)=>{
      const carry = c.rollover ? Number(c.carry||0) : 0;
      const effAlloc = Number(c.allocated||0) + carry;
      const monthSpent = Number(c.spent||0);
      const weekSpent = (c.entries||[]).filter(e=>inWeek(e.d)).reduce((s,e)=>s+Number(e.amt||0),0);
      const allocated = weekly ? effAlloc*(7/daysInMonth) : effAlloc;
      const spent = weekly ? weekSpent : monthSpent;
      const periodPct = weekly ? weekPct : monthPct;
      const periodWord = weekly ? 'week' : 'month';
      const pct = allocated>0 ? (spent/allocated)*100 : 0;
      const paceTarget = allocated*(periodPct/100);
      const over = spent>allocated && allocated>0;
      const ahead = spent - paceTarget;
      let paceCopy, badge, barColor;
      if (over){ paceCopy = `${fmt2(spent-allocated)} over this ${periodWord} — trim elsewhere or top this up`; badge='<span class="badge warn">over</span>'; barColor='var(--clay)'; }
      else if (allocated<=0){ paceCopy = 'No budget set'; badge=''; barColor='var(--line)'; }
      else if (ahead > allocated*0.08){ paceCopy = `By today you'd be on track under ${fmt(paceTarget)} — you're ${fmt2(ahead)} ahead of pace`; badge='<span class="badge priority">fast pace</span>'; barColor='var(--amber)'; }
      else { paceCopy = `${fmt2(allocated-spent)} left this ${periodWord} · ${ahead<-1 ? fmt2(-ahead)+' under pace — nicely done' : 'right on pace'}`; badge='<span class="badge ok">on track</span>'; barColor='var(--sage)'; }
      catList += `<div class="card">
        <div class="card-row">
          <div><div class="t-card">${esc(c.name)}</div>
          <div class="meta">${fmt2(spent)} of ${fmt(allocated)}${weekly?' this week':''}${!weekly && carry>0?' (incl. '+fmt(carry)+' rolled over)':''}</div></div>
          ${badge}
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${Math.min(pct,100)}%; background:${barColor}"></div>
          ${allocated>0?`<div class="bar-pace" style="left:${Math.min(periodPct,100)}%" title="where today sits in the ${periodWord}"></div>`:''}
        </div>
        <div class="micro">${paceCopy}</div>
        <div class="row2" style="margin-top:12px">
          <button class="mini-btn accent" data-spend="${idx}">Log spend</button>
          <button class="mini-btn" data-edit-cat="${idx}">Edit</button>
          <button class="mini-btn ${c.rollover?'accent':''}" data-rollover="${idx}">${c.rollover?'rollover ✓':'rollover off'}</button>
          <button class="mini-btn" data-remove-cat="${idx}">×</button>
        </div>
      </div>`;
    });

    let billList = state.bills.length ? '' : `<div class="empty">Track fixed commitments here — rent, insurance, phone, subscriptions. They feed your free-cash number and upcoming reminders.</div>`;
    const sortedBills = [...state.bills].sort((a,b)=>(a.dueDay||32)-(b.dueDay||32));
    sortedBills.forEach(b=>{
      const realIdx = state.bills.indexOf(b);
      const amountLine = b.freq==='annual' ? `${fmt2(b.amount)}/yr ≈ ${fmt2(Number(b.amount)/12)}/mo` : `${fmt2(b.amount)}/mo`;
      billList += `<div class="card" style="padding:13px 16px;">
        <div class="card-row">
          <div><div style="font-size:15px; font-weight:600;">${esc(b.name)}</div>
          <div class="meta">${amountLine}${b.dueDay?' · due the '+ord(b.dueDay):''}</div></div>
          <div class="row2" style="margin-top:0">
            <button class="mini-btn ${b.paid?'':'accent'}" data-bill-paid="${realIdx}">${b.paid?'paid ✓':'mark paid'}</button>
            <button class="mini-btn" data-remove-bill="${realIdx}">×</button>
          </div>
        </div>
      </div>`;
    });

    let goalList = state.goals.length ? '' : `<div class="empty">Savings goals — emergency fund, the Golf GTD fund, whatever. Set a target and a monthly amount and the Plan tab shows what it trades off against debt.</div>`;
    state.goals.forEach((g, idx)=>{
      const pct = Number(g.target)>0 ? Math.min(100, Math.round((Number(g.saved)/Number(g.target))*100)) : 0;
      let dateLine = '';
      if (g.targetDate && Number(g.saved) < Number(g.target)){
        const now2 = new Date();
        const td = new Date(g.targetDate + 'T12:00:00');
        const monthsLeft = Math.max(1, (td.getFullYear()-now2.getFullYear())*12 + (td.getMonth()-now2.getMonth()));
        const needed = (Number(g.target)-Number(g.saved)) / monthsLeft;
        dateLine = `<div class="micro">To hit ${MONTHS[td.getMonth()]} ${td.getFullYear()} you need ${fmt2(needed)}/month${Number(g.monthly)>0 && needed > Number(g.monthly)*1.05 ? ' — more than your current '+fmt(g.monthly) : ''}</div>`;
      }
      goalList += `<div class="card">
        <div class="card-row">
          <div><div class="t-card">${esc(g.name)}</div>
          <div class="meta">${fmt(g.saved)} of ${fmt(g.target)}${Number(g.monthly)>0?' · adding '+fmt(g.monthly)+'/mo':''}</div></div>
          <span class="badge ${pct>=100?'ok':'priority'}">${pct}%</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:var(--sage)"></div></div>
        ${dateLine}
        <div class="row2" style="margin-top:12px">
          <button class="mini-btn accent" data-goal-add="${idx}">Add to it</button>
          <button class="mini-btn" data-remove-goal="${idx}">Remove</button>
        </div>
      </div>`;
    });

    el.innerHTML = `
      <div class="section"><span class="t-section">Income</span>
        <span class="seg" style="width:170px;">
          <button id="pf-monthly" class="${state.settings.payFrequency!=='4weekly'?'active':''}">Monthly</button>
          <button id="pf-4weekly" class="${state.settings.payFrequency==='4weekly'?'active':''}">4-weekly</button>
        </span>
      </div>
      <div class="card">
        <div class="field" style="margin-bottom:${state.settings.payFrequency==='4weekly'?'12px':'0'}">
          <label>${state.settings.payFrequency==='4weekly'?'Take-home per pay packet (£)':'Take-home per month (£)'}</label>
          <input id="income-input" type="number" inputmode="decimal" value="${state.budgetIncome||''}" placeholder="0"/>
        </div>
        ${state.settings.payFrequency==='4weekly'?`
        <div class="field" style="margin-bottom:0">
          <label>Next payday</label>
          <input id="payday-input" type="date" value="${state.settings.nextPayday||''}"/>
        </div>
        <div class="micro" style="margin-top:8px;">4-weekly means 13 packets a year — that's ${fmt(monthlyIncome())} a month on average, which is what the budget maths uses.${(()=>{
          const bm = bonusPacketMonth();
          return bm ? ` Your double-payday month is <b style="color:var(--amber)">${MONTHS[bm.getMonth()]} ${bm.getFullYear()}</b> — a whole spare packet worth pointing at your target debt.` : '';
        })()}</div>`:''}
        ${m.income>0?`<div class="micro" style="margin-top:10px;">Bills ${fmt(m.billsTotal)} + minimums ${fmt(m.minTotal)} + extra debt ${fmt(m.extra)} + goals ${fmt(m.goalsTotal)} → <b style="color:${m.freeCash<0?'var(--clay)':'var(--sage)'}">${fmt(m.freeCash)} free</b> for the categories below</div>`:''}
      </div>

      <div class="section"><span class="t-section">Bills &amp; commitments</span><span class="t-micro">${fmt(m.billsTotal)}/mo</span></div>
      ${billList}
      <button class="plus" id="show-bill-form">+ add bill</button>
      <div class="form" id="bill-form">
        <div class="field"><label>Name</label><input id="b-name" placeholder="e.g. Car insurance"/></div>
        <div class="row2">
          <div class="field"><label>Amount (£)</label><input id="b-amount" type="number" inputmode="decimal" placeholder="0"/></div>
          <div class="field"><label>Frequency</label>
            <select id="b-freq"><option value="monthly">Monthly</option><option value="annual">Annual</option></select>
          </div>
        </div>
        <div class="field"><label>Due day of month (1–31)</label><input id="b-due" type="number" inputmode="numeric" min="1" max="31" placeholder="e.g. 15"/></div>
        <button class="btn" id="save-bill">Save bill</button>
        <button class="btn ghost" id="cancel-bill">Cancel</button>
      </div>

      <div class="section"><span class="t-section">Spending categories</span>
        <span style="display:flex; gap:8px; align-items:center;">
          ${state.categories.length?`<span class="seg" style="width:132px;"><button id="bv-month" class="${!weekly?'active':''}">Month</button><button id="bv-week" class="${weekly?'active':''}">Week</button></span>`:''}
          ${state.categories.length?'<button class="mini-btn" id="new-month">reset month</button>':''}
        </span>
      </div>
      ${catList}
      <button class="plus" id="show-cat-form">+ add category</button>
      <div class="form" id="cat-form">
        <div class="field"><label>Category name</label><input id="c-name" placeholder="e.g. Groceries"/></div>
        <div class="field"><label>Budget per month (£)</label><input id="c-allocated" type="number" inputmode="decimal" placeholder="0"/></div>
        <button class="btn" id="save-cat">Save category</button>
        <button class="btn ghost" id="cancel-cat">Cancel</button>
      </div>

      <div class="section"><span class="t-section">Savings goals</span></div>
      ${goalList}
      <button class="plus" id="show-goal-form">+ add goal</button>
      <div class="form" id="goal-form">
        <div class="field"><label>Goal name</label><input id="g-name" placeholder="e.g. Emergency fund"/></div>
        <div class="row2">
          <div class="field"><label>Target (£)</label><input id="g-target" type="number" inputmode="decimal" placeholder="1000"/></div>
          <div class="field"><label>Saved so far (£)</label><input id="g-saved" type="number" inputmode="decimal" placeholder="0"/></div>
        </div>
        <div class="row2">
          <div class="field"><label>Monthly contribution (£)</label><input id="g-monthly" type="number" inputmode="decimal" placeholder="0"/></div>
          <div class="field"><label>Target date (optional)</label><input id="g-date" type="date"/></div>
        </div>
        <button class="btn" id="save-goal">Save goal</button>
        <button class="btn ghost" id="cancel-goal">Cancel</button>
      </div>
    `;

    document.getElementById('income-input').onchange = e=>{ state.budgetIncome = parseFloat(e.target.value)||0; save(); renderAll(); };
    document.getElementById('pf-monthly').onclick = ()=>{ state.settings.payFrequency='monthly'; save(); renderAll(); };
    document.getElementById('pf-4weekly').onclick = ()=>{ state.settings.payFrequency='4weekly'; save(); renderAll(); };
    const pd = document.getElementById('payday-input');
    if (pd) pd.onchange = e=>{ state.settings.nextPayday = e.target.value || null; save(); renderAll(); };
    const nm = document.getElementById('new-month'); if (nm) nm.onclick = ()=>{ if (confirm('Reset all category spending to £0 and mark bills unpaid for the new month? Budgets stay as they are.')) startNewMonth(); };

    // bills
    document.getElementById('show-bill-form').onclick = ()=> document.getElementById('bill-form').classList.add('open');
    document.getElementById('cancel-bill').onclick = ()=> document.getElementById('bill-form').classList.remove('open');
    document.getElementById('save-bill').onclick = ()=>{
      const name = document.getElementById('b-name').value.trim();
      const amount = parseFloat(document.getElementById('b-amount').value)||0;
      const freq = document.getElementById('b-freq').value;
      const dueDay = parseInt(document.getElementById('b-due').value)||null;
      if (!name || amount<=0){ toast('A bill needs a name and an amount'); return; }
      state.bills.push({ name, amount, freq, dueDay, paid:false });
      logActivity(`Added bill: ${name} (${freq==='annual'?fmt2(amount)+'/yr':fmt2(amount)+'/mo'})`);
      save(); renderAll();
    };
    el.querySelectorAll('[data-bill-paid]').forEach(btn=>{
      btn.onclick = ()=>{ const b=state.bills[parseInt(btn.dataset.billPaid)]; b.paid=!b.paid;
        if (b.paid) logActivity(`Marked ${b.name} paid`);
        save(); renderAll(); };
    });
    el.querySelectorAll('[data-remove-bill]').forEach(btn=>{
      btn.onclick = ()=>{ const i=parseInt(btn.dataset.removeBill);
        if (confirm(`Remove the bill "${state.bills[i].name}"?`)){ logActivity(`Removed bill: ${state.bills[i].name}`); state.bills.splice(i,1); save(); renderAll(); } };
    });

    // categories
    document.getElementById('show-cat-form').onclick = ()=> document.getElementById('cat-form').classList.add('open');
    document.getElementById('cancel-cat').onclick = ()=> document.getElementById('cat-form').classList.remove('open');
    document.getElementById('save-cat').onclick = ()=>{
      const name = document.getElementById('c-name').value.trim();
      const allocated = parseFloat(document.getElementById('c-allocated').value)||0;
      if (!name){ toast('Give the category a name'); return; }
      state.categories.push({ name, allocated, spent:0 });
      logActivity(`Added category: ${name}`);
      save(); renderAll();
    };
    el.querySelectorAll('[data-remove-cat]').forEach(btn=>{
      btn.onclick = ()=>{ const i=parseInt(btn.dataset.removeCat);
        if (confirm(`Remove "${state.categories[i].name}" and its spending record for this month?`)){ state.categories.splice(i,1); save(); renderAll(); } };
    });
    el.querySelectorAll('[data-edit-cat]').forEach(btn=>{
      btn.onclick = ()=>{ const i=parseInt(btn.dataset.editCat); const c=state.categories[i];
        openSheet({
          title: 'Edit ' + c.name,
          fields: [{ id:'alloc', label:'Budget per month (£)', value: c.allocated }],
          onSave: (v)=>{
            const n = parseFloat(v.alloc);
            if (isNaN(n) || n<0){ toast('Enter a valid amount'); return false; }
            c.allocated = n; save(); renderAll();
          }
        });
      };
    });
    const bvM = document.getElementById('bv-month'), bvW = document.getElementById('bv-week');
    if (bvM) bvM.onclick = ()=>{ state.settings.budgetView='month'; save(); renderBudget(); };
    if (bvW) bvW.onclick = ()=>{ state.settings.budgetView='week'; save(); renderBudget(); };
    el.querySelectorAll('[data-rollover]').forEach(btn=>{
      btn.onclick = ()=>{ const i=parseInt(btn.dataset.rollover); const c=state.categories[i];
        c.rollover = !c.rollover;
        if (!c.rollover) c.carry = 0;
        toast(c.rollover ? `${c.name}: unspent money now rolls into next month` : `${c.name}: rollover off`);
        save(); renderBudget(); };
    });
    el.querySelectorAll('[data-spend]').forEach(btn=>{
      btn.onclick = ()=>{ const i=parseInt(btn.dataset.spend);
        const c = state.categories[i];
        openSheet({
          title: 'Log spending — ' + c.name,
          saveLabel: 'Log spend',
          fields: [{ id:'amt', label:'Amount (£)', placeholder:'0' }],
          onSave: (v)=>{
            const val = parseFloat(v.amt);
            if (isNaN(val) || val<=0){ toast('Enter an amount above zero'); return false; }
            const prevSpent = Number(c.spent||0);
            const activityTxt = `Spent ${fmt2(val)} on ${c.name}`;
            c.spent = prevSpent + val;
            c.entries = c.entries||[];
            c.entries.push({ d:new Date().toISOString().slice(0,10), amt:val });
            logActivity(activityTxt);
            save(); renderAll();
            toast(`${fmt2(val)} logged against ${c.name}`, ()=>{
              c.spent = prevSpent;
              c.entries.pop();
              dropActivityHead(activityTxt);
            });
          }
        });
      };
    });

    // goals
    document.getElementById('show-goal-form').onclick = ()=> document.getElementById('goal-form').classList.add('open');
    document.getElementById('cancel-goal').onclick = ()=> document.getElementById('goal-form').classList.remove('open');
    document.getElementById('save-goal').onclick = ()=>{
      const name = document.getElementById('g-name').value.trim();
      const target = parseFloat(document.getElementById('g-target').value)||0;
      const saved = parseFloat(document.getElementById('g-saved').value)||0;
      const monthly = parseFloat(document.getElementById('g-monthly').value)||0;
      const targetDate = document.getElementById('g-date').value || null;
      if (!name || target<=0){ toast('A goal needs a name and a target'); return; }
      state.goals.push({ name, target, saved, monthly, targetDate });
      logActivity(`Added goal: ${name} (${fmt(target)})`);
      save(); renderAll();
    };
    el.querySelectorAll('[data-goal-add]').forEach(btn=>{
      btn.onclick = ()=>{ const i=parseInt(btn.dataset.goalAdd);
        const g = state.goals[i];
        openSheet({
          title: 'Add to ' + g.name,
          saveLabel: 'Add it',
          fields: [{ id:'amt', label:'Amount (£)', value: g.monthly||'', placeholder:'0' }],
          onSave: (v)=>{
            const val = parseFloat(v.amt);
            if (isNaN(val) || val<=0){ toast('Enter an amount above zero'); return false; }
            const prevSaved = Number(g.saved||0);
            const activityTxt = `Saved ${fmt2(val)} into ${g.name}`;
            g.saved = prevSaved + val;
            logActivity(activityTxt);
            save(); renderAll();
            const hit = g.saved >= g.target;
            toast(hit ? `${g.name} — target hit 🎉` : `${fmt2(val)} into ${g.name}`, ()=>{
              g.saved = prevSaved;
              dropActivityHead(activityTxt);
            });
          }
        });
      };
    });
    el.querySelectorAll('[data-remove-goal]').forEach(btn=>{
      btn.onclick = ()=>{ const i=parseInt(btn.dataset.removeGoal);
        if (confirm(`Remove the goal "${state.goals[i].name}"?`)){ state.goals.splice(i,1); save(); renderAll(); } };
    });
  }

        <input type="file" id="excel-file" accept=".xlsx,.xls,.csv" style="display:none"/>
        <input type="file" id="json-file" accept=".json,application/json" style="display:none"/>
        <textarea id="backup-box" placeholder="Backup text appears here / paste here to restore" style="display:none; width:100%; margin-top:12px; background:var(--bg); border:1px solid var(--line); color:var(--text); border-radius:8px; font-family:var(--mono); font-size:12px; padding:10px; min-height:80px;"></textarea>
        <div id="backup-msg" class="t-help" style="margin-top:10px; display:none;"></div>
        <div class="micro" style="margin-top:10px;">Moving to another device? Download the file here, then Import file there — that's the sync ritual.</div>
      </div>

      <div class="section"><span class="t-section">Activity log</span></div>
      <div class="card" style="padding:6px 16px;">
        ${state.activity.length
          ? state.activity.slice(0,40).map(a=>`<div class="activity-item"><span>${esc(a.txt)}</span><span class="t-micro">${a.d}</span></div>`).join('')
          : '<div class="t-help" style="padding:12px 0; color:var(--text-3)">Payments, spends and changes will show up here.</div>'}
      </div>

      <div class="section"><span class="t-section">About</span></div>
      <div class="card">
        <div class="t-help">Runway is a private, offline-first finance tracker. No account, no bank connection, no subscription. Your figures never leave this device unless you export them yourself. Reminders are in-app only — a saved web app can't send notifications when it's closed, and Runway doesn't pretend otherwise.</div>
        <div class="micro" style="margin-top:10px;">Assumptions the projections make: interest compounds monthly at the stated APR (fixed/HP loans accrue nothing — their interest is already in the balance); minimum payments stay fixed; when a debt clears, its minimum rolls into the attack; 0% promos revert to their stated post-promo rate on the end date.</div>
      </div>

      <div class="section"><span class="t-section">Diagnostics</span></div>
      <div class="card">
        <div class="t-help" style="margin-bottom:12px;">Six checks that verify the payoff engine against independently calculated answers — amortisation maths, promo flips, rollover, and more.</div>
        <button class="mini-btn accent" id="run-tests" style="width:100%;">Run self-tests</button>
        <div id="test-results" style="margin-top:10px;"></div>
      </div>
    `;
    document.getElementById('show-acct-form').onclick = ()=> document.getElementById('acct-form').classList.add('open');
    document.getElementById('cancel-acct').onclick = ()=> document.getElementById('acct-form').classList.remove('open');
    document.getElementById('save-acct').onclick = ()=>{
      const name = document.getElementById('a-name').value.trim();
      const type = document.getElementById('a-type').value;
      const balance = parseFloat(document.getElementById('a-balance').value)||0;
      if (!name){ toast('Give the account a name'); return; }
      state.accounts.push({ name, type, balance });
      logActivity(`Added account: ${name}`);
      save(); renderAll();
    };
    el.querySelectorAll('[data-edit-acct]').forEach(btn=>{
      btn.onclick = ()=>{ const i=parseInt(btn.dataset.editAcct); const a=state.accounts[i];
        openSheet({
          title: 'Update ' + a.name,
          fields: [{ id:'bal', label:'Current balance (£)', value: a.balance }],
          onSave: (v)=>{
            const n = parseFloat(v.bal);
            if (isNaN(n)){ toast('Enter a valid balance'); return false; }
            a.balance = n; logActivity(`Updated ${a.name} balance to ${fmt2(n)}`); save(); renderAll();
          }
        });
      };
    });
    el.querySelectorAll('[data-remove-acct]').forEach(btn=>{
      btn.onclick = ()=>{ const i=parseInt(btn.dataset.removeAcct);
        if (confirm(`Remove the account "${state.accounts[i].name}"?`)){ state.accounts.splice(i,1); save(); renderAll(); } };
    });
    document.getElementById('theme-dark').onclick = ()=>{ state.settings.theme='dark'; applyTheme(); save(); renderMore(); };
    document.getElementById('theme-light').onclick = ()=>{ state.settings.theme='light'; applyTheme(); save(); renderMore(); };

    // PIN lock
    document.getElementById('pin-toggle').onclick = ()=>{
      if (state.settings.pinHash){
        openSheet({ title:'Remove PIN lock', saveLabel:'Remove', fields:[{id:'pin', label:'Current PIN', type:'password'}],
          onSave: (v)=>{ sha256(v.pin).then(h=>{
            if (h === state.settings.pinHash){ state.settings.pinHash=null; save(); renderMore(); toast('PIN removed'); }
            else toast("That PIN doesn't match");
          }); } });
      } else {
        openSheet({ title:'Set a PIN', saveLabel:'Set PIN', fields:[{id:'pin', label:'New PIN (4–8 digits)', type:'password'},{id:'pin2', label:'Repeat it', type:'password'}],
          onSave: (v)=>{
            if (!/^\d{4,8}$/.test(v.pin)){ toast('PIN needs to be 4–8 digits'); return false; }
            if (v.pin !== v.pin2){ toast("They don't match — try again"); return false; }
            sha256(v.pin).then(h=>{ state.settings.pinHash=h; save(); renderMore(); toast('PIN set — asked on every open'); });
          } });
      }
    };

    // file backup / restore
    document.getElementById('backup-download').onclick = ()=>{
      try {
        const blob = new Blob([JSON.stringify(state, null, 1)], {type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'runway-backup-' + new Date().toISOString().slice(0,10) + '.json';
        a.click();
        state.lastBackupAt = new Date().toISOString();
        save(); renderMore();
        toast('Backup file downloaded');
      } catch(e){ toast('Download blocked here — use Copy backup instead'); }
    };
    const jsonInput = document.getElementById('json-file');
    document.getElementById('backup-import-file').onclick = ()=> jsonInput.click();
    jsonInput.onchange = async (e)=>{
      const file = e.target.files[0];
      if (!file) return;
      try {
        const parsed = JSON.parse(await file.text());
        if (!parsed || typeof parsed!=='object' || !Array.isArray(parsed.debts)) throw new Error('bad');
        if (!confirm('Replace everything on this device with the backup file? This cannot be undone.')){ jsonInput.value=''; return; }
        state = migrate(parsed);
        logActivity('Restored from backup file');
        save(); applyTheme(); renderAll();
        toast('Restored from file');
      } catch(err){ toast("That file doesn't look like a Runway backup"); }
      jsonInput.value='';
    };

    // self-tests
    document.getElementById('run-tests').onclick = ()=>{
      const results = runSelfTests();
      const passed = results.filter(r=>r.pass).length;
      document.getElementById('test-results').innerHTML =
        `<div class="t-help" style="margin-bottom:8px; color:${passed===results.length?'var(--sage)':'var(--clay)'}">${passed}/${results.length} passed</div>` +
        results.map(r=>`<div class="activity-item"><span class="${r.pass?'test-pass':'test-fail'}">${r.pass?'✓':'✗'} ${esc(r.name)}</span><span class="t-micro">${esc(r.detail)}</span></div>`).join('');
    };

    wireBackup();
    document.getElementById('export-csv').onclick = ()=>{
      try {
        let csv = 'Type,Name,Value1,Value2,Value3,Date\n';
        state.debts.forEach(d=>{ csv += `debt,"${d.name.replace(/"/g,'""')}",${d.balance},${d.apr},${d.minPayment},\n`;
          (d.payments||[]).forEach(p=>{ csv += `payment,"${d.name.replace(/"/g,'""')}",${p.amt},,,${p.d}\n`; }); });
        state.categories.forEach(c=>{ csv += `category,"${c.name.replace(/"/g,'""')}",${c.allocated},${c.spent},,\n`; });
        state.bills.forEach(b=>{ csv += `bill,"${b.name.replace(/"/g,'""')}",${b.amount},${b.dueDay||''},,\n`; });
        state.goals.forEach(g=>{ csv += `goal,"${g.name.replace(/"/g,'""')}",${g.target},${g.saved},${g.monthly},\n`; });
        state.accounts.forEach(a=>{ csv += `account,"${a.name.replace(/"/g,'""')}",${a.balance},${a.type||''},,\n`; });
        state.snapshots.forEach(s=>{ csv += `snapshot,${s.k},${s.assets},${s.owed},${s.net},\n`; });
        const blob = new Blob([csv], {type:'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'runway-export.csv';
        a.click();
        toast('CSV downloaded');
      } catch(e){ toast('Download blocked here — use Copy backup instead'); }
    };
  }

  function wireBackup(){
    const box = document.getElementById('backup-box');
    const msg = document.getElementById('backup-msg');
    if (!box) return;
    function note(t, ok){ msg.style.display='block'; msg.style.color = ok?'var(--sage)':'var(--clay)'; msg.textContent=t; }
    document.getElementById('backup-copy').onclick = async ()=>{
      const data = JSON.stringify(state);
      box.style.display='block'; box.value=data; box.select();
      state.lastBackupAt = new Date().toISOString();
      save();
      try { await navigator.clipboard.writeText(data); note('Copied — paste it somewhere safe (notes app, message to yourself).', true); }
      catch(e){ note('Clipboard blocked — long-press the text above and copy it manually.', false); }
    };
    document.getElementById('backup-restore').onclick = ()=>{
      if (box.style.display!=='block'){ box.style.display='block'; box.value=''; box.focus(); note('Paste your backup text above, then tap Restore again.', true); return; }
      try {
        const parsed = JSON.parse(box.value.trim());
        if (!parsed || typeof parsed!=='object' || !Array.isArray(parsed.debts)) throw new Error('bad');
        state = migrate(parsed);
        logActivity('Restored from backup');
        save(); renderAll();
        note('Restored.', true);
      } catch(e){ note("That doesn't look like a valid backup — check you pasted the whole thing.", false); }
    };
    const fileInput = document.getElementById('excel-file');
    document.getElementById('import-excel').onclick = ()=>{
      if (typeof XLSX==='undefined'){ note('Spreadsheet library failed to load — check your connection and reopen.', false); return; }
      fileInput.click();
    };
    fileInput.onchange = async (e)=>{
      const file = e.target.files[0];
      if (!file) return;
      try {
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, {type:'array'});
        const cleanNum = v => { if (typeof v==='number') return v; const n=parseFloat(String(v??'').replace(/[£$,%\s]/g,'')); return isNaN(n)?0:n; };
        const norm = s => String(s??'').toLowerCase().replace(/[^a-z]/g,'');
        const NAME_H=['name','debt','debtname','loan','account'], BAL_H=['balance','amount','owed','outstanding','remaining'],
              APR_H=['apr','rate','interest','interestrate','aprpercent'], MIN_H=['minpayment','min','minimum','minimumpayment','monthlypayment','payment','monthly','permonth'],
              CAT_H=['category','categoryname','budgetcategory','pot','potname'], ALLOC_H=['allocated','allocation','budget','budgeted','limit','monthlybudget'], SPENT_H=['spent','spend','used','actual'];
        const findCol = (cells,names) => cells.findIndex(c=>names.includes(norm(c)));
        let newDebts=[], newCats=[];
        wb.SheetNames.forEach(sn=>{
          const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], {header:1, defval:''});
          let mode=null, cols={};
          rows.forEach(r=>{
            const nameCol=findCol(r,NAME_H), balCol=findCol(r,BAL_H), catCol=findCol(r,CAT_H), allocCol=findCol(r,ALLOC_H);
            if (nameCol>=0 && balCol>=0){ mode='debt'; cols={name:nameCol,bal:balCol,apr:findCol(r,APR_H),min:findCol(r,MIN_H)}; return; }
            if (catCol>=0 && allocCol>=0){ mode='cat'; cols={name:catCol,alloc:allocCol,spent:findCol(r,SPENT_H)}; return; }
            if (!mode) return;
            const label = String(r[cols.name]??'').trim();
            if (!label) return;
            if (norm(label).startsWith('total')){ mode=null; return; }
            if (mode==='debt'){
              const bal = cleanNum(r[cols.bal]);
              if (bal>0) newDebts.push({ name:label, balance:bal, original:bal, apr:cols.apr>=0?cleanNum(r[cols.apr]):0, minPayment:cols.min>=0?cleanNum(r[cols.min]):0, payments:[], promoEnd:null, postPromoApr:null });
            } else {
              const alloc = cleanNum(r[cols.alloc]);
              if (alloc>0) newCats.push({ name:label, allocated:alloc, spent:cols.spent>=0?cleanNum(r[cols.spent]):0 });
            }
          });
        });
        if (!newDebts.length && !newCats.length){ note('No recognisable rows. Debts need Name + Balance columns; budget rows need Category + Allocated.', false); fileInput.value=''; return; }
        const replace = (state.debts.length||state.categories.length)
          ? confirm(`Found ${newDebts.length} debt(s) and ${newCats.length} categorie(s).\n\nOK = REPLACE existing data\nCancel = ADD to existing data`)
          : true;
        if (replace){ if (newDebts.length) state.debts=newDebts; if (newCats.length) state.categories=newCats; }
        else { state.debts=state.debts.concat(newDebts); state.categories=state.categories.concat(newCats); }
        logActivity(`Imported ${newDebts.length} debts, ${newCats.length} categories from spreadsheet`);
        save(); renderAll();
        const msg2 = document.getElementById('backup-msg');
        if (msg2){ msg2.style.display='block'; msg2.style.color='var(--sage)'; msg2.textContent=`Imported ${newDebts.length} debt(s), ${newCats.length} categorie(s) from ${file.name}.`; }
      } catch(err){ note("Could not read that file — make sure it's a valid .xlsx or .csv.", false); }
      fileInput.value='';
    };
  }

  function renderAll(){
    if (!loaded) return;
    applyTheme();
    updateStorageBadge();
    renderHome();
    renderPlan();
    renderDebts();
    renderBudget();
    renderMore();
  }

  load();
})();
</script>
